<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Messages | Vendor Atlas</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/dash-layout.css">
  <style>
    /* ── Two-panel messaging layout ── */
    .msg-shell {
      display: flex;
      height: calc(100vh - 56px); /* below topbar */
      overflow: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--surface);
    }

    /* Left: conversation list */
    .msg-sidebar {
      width: 300px;
      min-width: 260px;
      max-width: 300px;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .msg-sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .msg-sidebar-title {
      font-weight: 700;
      font-size: .92rem;
    }
    .msg-new-btn {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .msg-new-btn:hover { opacity: .87; }
    .msg-search-wrap {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
    }
    .msg-search-wrap input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 12px;
      font-size: .84rem;
      background: var(--bg);
      color: var(--text);
      box-sizing: border-box;
    }
    .msg-search-wrap input:focus { outline: none; border-color: var(--brand); }
    .msg-conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .msg-conv-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 10px;
      margin: 2px 6px;
      position: relative;
      transition: background .12s;
    }
    .msg-conv-item:hover { background: var(--bg); }
    .msg-conv-item.active { background: rgba(15,118,110,.09); }
    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--brand);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .95rem;
      flex-shrink: 0;
    }
    .msg-conv-meta { flex: 1; min-width: 0; }
    .msg-conv-name {
      font-weight: 600;
      font-size: .875rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-conv-preview {
      font-size: .775rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-conv-time {
      font-size: .7rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .msg-unread-badge {
      position: absolute;
      right: 14px;
      top: 10px;
      background: var(--brand);
      color: #fff;
      border-radius: 99px;
      font-size: .65rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .msg-empty-convs {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: .875rem;
    }

    /* Right: active chat panel */
    .msg-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }
    .msg-chat-header {
      padding: 13px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .msg-chat-title {
      font-weight: 700;
      font-size: .95rem;
    }
    .msg-chat-subtitle {
      font-size: .78rem;
      color: var(--muted);
    }
    .msg-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-bubble-wrap { max-width: 70%; }
    .msg-bubble {
      padding: .55rem .95rem;
      border-radius: 18px;
      font-size: .875rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-row.mine .msg-bubble {
      background: var(--brand);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.theirs .msg-bubble {
      background: var(--bg);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-bubble-meta {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 3px;
      padding: 0 4px;
    }
    .msg-row.mine .msg-bubble-meta { text-align: right; }
    .msg-sender-label {
      font-size: .7rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 2px;
      padding: 0 4px;
    }
    .msg-date-divider {
      text-align: center;
      font-size: .72rem;
      color: var(--muted);
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .msg-date-divider::before,
    .msg-date-divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--line);
    }
    .msg-typing {
      font-size: .78rem;
      color: var(--muted);
      font-style: italic;
      padding: 4px 18px;
      min-height: 20px;
    }

    /* Composer */
    .msg-composer {
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--surface);
    }
    .msg-composer textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 9px 14px;
      font-size: .875rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.4;
    }
    .msg-composer textarea:focus { outline: none; border-color: var(--brand); }
    .msg-send-btn {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .msg-send-btn:hover { opacity: .87; }
    .msg-send-btn:disabled { opacity: .4; cursor: default; }

    /* Empty state / welcome */
    .msg-welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }
    .msg-welcome svg { opacity: .35; }
    .msg-welcome h3 { margin: 0; font-size: 1.1rem; color: var(--text); }
    .msg-welcome p { margin: 0; font-size: .875rem; }

    /* Load more */
    .msg-load-more {
      text-align: center;
      margin-bottom: 6px;
    }
    .msg-load-more button {
      background: none;
      border: 1px solid var(--line);
      border-radius: 99px;
      padding: 4px 16px;
      font-size: .78rem;
      color: var(--muted);
      cursor: pointer;
    }
    .msg-load-more button:hover { border-color: var(--brand); color: var(--brand); }

    /* New conversation modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(12,31,29,.45);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.hidden { display: none; }
    .modal-box {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px rgba(12,31,29,.18);
    }
    .modal-box h3 { margin: 0 0 1rem; font-size: 1.1rem; }
    .modal-box label { display: block; font-size: .8rem; font-weight: 700; color: var(--muted); margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .06em; }
    .modal-box input, .modal-box textarea, .modal-box select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: .875rem;
      background: var(--bg);
      color: var(--text);
      margin-bottom: .85rem;
      box-sizing: border-box;
    }
    .modal-box input:focus, .modal-box textarea:focus, .modal-box select:focus { outline: none; border-color: var(--brand); }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: .5rem; }
    .modal-actions .btn-cancel { background: none; border: 1.5px solid var(--line); border-radius: 10px; padding: .45rem 1rem; font-size: .85rem; cursor: pointer; color: var(--text); }
    .modal-actions .btn-send { background: var(--brand); color: #fff; border: none; border-radius: 10px; padding: .45rem 1.1rem; font-size: .85rem; font-weight: 700; cursor: pointer; }
    .modal-actions .btn-send:hover { opacity: .87; }

    /* Mobile: hide list, show chat */
    @media (max-width: 700px) {
      .msg-sidebar { width: 100%; max-width: 100%; flex-shrink: 0; }
      .msg-main { display: none; }
      .msg-shell.chat-open .msg-sidebar { display: none; }
      .msg-shell.chat-open .msg-main { display: flex; }
      .msg-back-btn { display: inline-flex !important; }
    }
    .msg-back-btn {
      display: none;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      font-size: .85rem;
      cursor: pointer;
      color: var(--brand);
      font-weight: 600;
      padding: 0;
    }
  </style>
</head>
<body>

<div class="dash-shell">
  <!-- Sidebar injected by dash-layout.js -->
  <aside class="dash-sidebar" id="dash-sidebar">
    <div class="dash-sidebar-top">
      <div class="dash-brand">
        <a href="/" class="dash-brand-link">
          <span class="dash-brand-icon">🏪</span>
          <span class="dash-brand-name">Vendor Atlas</span>
        </a>
        <button class="dash-collapse-btn" id="sidebar-collapse-btn" title="Collapse sidebar" aria-label="Toggle sidebar">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M15 6l-6 6 6 6"/></svg>
        </button>
      </div>
      <nav class="dash-nav" id="dash-nav"></nav>
    </div>
    <div class="dash-sidebar-bottom">
      <a href="/settings" class="dash-nav-link"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path stroke="currentColor" stroke-width="2" d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="dash-nav-label">Settings</span></a>
    </div>
  </aside>

  <div class="dash-body">
    <header class="dash-topbar">
      <button class="dash-mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <span class="dash-topbar-title">Messages</span>
      <div style="flex:1"></div>
    </header>

    <main class="dash-content" style="padding: 0; overflow: hidden;">
      <div class="msg-shell" id="msg-shell">

        <!-- Left: conversation list -->
        <div class="msg-sidebar">
          <div class="msg-sidebar-header">
            <span class="msg-sidebar-title">Messages</span>
            <button class="msg-new-btn" onclick="openNewConvModal()">+ New</button>
          </div>
          <div class="msg-search-wrap">
            <input type="search" id="conv-search" placeholder="Search conversations…" oninput="filterConversations(this.value)">
          </div>
          <div class="msg-conv-list" id="conv-list">
            <div class="msg-empty-convs">Loading…</div>
          </div>
        </div>

        <!-- Right: chat panel -->
        <div class="msg-main" id="msg-main">
          <div class="msg-welcome" id="msg-welcome">
            <svg width="56" height="56" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="1.5" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <h3>Your messages</h3>
            <p>Select a conversation or start a new one.</p>
          </div>

          <!-- Active chat (hidden until conversation selected) -->
          <div id="msg-chat-panel" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
            <div class="msg-chat-header">
              <button class="msg-back-btn" onclick="closeMobileChat()">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M15 18l-6-6 6-6"/></svg>
                Back
              </button>
              <div class="msg-avatar" id="chat-avatar">?</div>
              <div>
                <div class="msg-chat-title" id="chat-title">—</div>
                <div class="msg-chat-subtitle" id="chat-subtitle"></div>
              </div>
            </div>

            <div class="msg-body" id="msg-body">
              <div class="msg-load-more" id="load-more-wrap" style="display:none;">
                <button onclick="loadMoreMessages()">Load older messages</button>
              </div>
            </div>

            <div class="msg-typing" id="msg-typing"></div>

            <div class="msg-composer">
              <textarea id="msg-input" placeholder="Message…" rows="1" onkeydown="handleComposerKey(event)" oninput="autoResize(this)"></textarea>
              <button class="msg-send-btn" id="send-btn" onclick="sendMessage()" title="Send">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile drawer -->
  <div class="mobile-drawer-overlay hidden" id="mobile-drawer-overlay" onclick="closeMobileDrawer()"></div>
  <div class="mobile-slide-drawer" id="mobile-slide-drawer">
    <div class="mobile-drawer-header">
      <a href="/" class="dash-brand-link" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
        <span style="font-size:1.3rem;">🏪</span>
        <span style="font-weight:800;color:var(--text);">Vendor Atlas</span>
      </a>
      <button onclick="closeMobileDrawer()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);">✕</button>
    </div>
    <nav class="dash-nav" id="mobile-drawer-nav"></nav>
  </div>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav">
    <div class="bottom-nav-items" id="bottom-nav-items"></div>
  </nav>
</div>

<!-- New conversation modal -->
<div class="modal-backdrop hidden" id="new-conv-modal">
  <div class="modal-box">
    <h3>New Message</h3>
    <label for="nc-username">Username or User ID</label>
    <input type="text" id="nc-username" placeholder="e.g. craftyjane or user ID">
    <label for="nc-message">Message (optional)</label>
    <textarea id="nc-message" placeholder="Start with a message…" rows="3"></textarea>
    <div id="nc-error" style="font-size:.8rem;color:var(--danger);margin-bottom:.75rem;display:none;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNewConvModal()">Cancel</button>
      <button class="btn-send" onclick="startNewConversation()">Start Conversation</button>
    </div>
  </div>
</div>

<script src="/assets/app.js"></script>
<script src="/assets/dash-layout.js"></script>
<script>
(function () {
  /* ── State ─────────────────────────────────────────────────────────────── */
  var ME = null;
  var activeConvId = null;
  var allConvs = [];
  var pollTimer = null;
  var lastMsgTimestamp = null;
  var loadingMore = false;
  var oldestMsgTimestamp = null;
  var hasMore = false;

  /* ── Init ──────────────────────────────────────────────────────────────── */
  async function init() {
    try {
      var res = await fetch('/api/auth/me', { credentials: 'include' });
      var data = await res.json();
      if (!data.ok || !data.user) {
        window.location.href = '/signin?next=/messages';
        return;
      }
      ME = data.user;
    } catch (e) {
      window.location.href = '/signin?next=/messages';
      return;
    }

    // Check for ?conv= query param to auto-open a conversation
    var params = new URLSearchParams(window.location.search);
    var convParam = params.get('conv');

    await loadConversations();

    if (convParam) {
      openConversation(convParam);
    }
  }

  /* ── Conversations ─────────────────────────────────────────────────────── */
  async function loadConversations() {
    try {
      var res = await fetch('/api/messages/conversations', { credentials: 'include' });
      var data = await res.json();
      allConvs = data.conversations || [];
      renderConvList(allConvs);
    } catch (e) {
      document.getElementById('conv-list').innerHTML =
        '<div class="msg-empty-convs">Failed to load conversations.</div>';
    }
  }

  function renderConvList(convs) {
    var list = document.getElementById('conv-list');
    if (!convs.length) {
      list.innerHTML = '<div class="msg-empty-convs">No conversations yet.<br>Hit <strong>+ New</strong> to start one.</div>';
      return;
    }
    list.innerHTML = convs.map(function (c) {
      var name = convDisplayName(c);
      var initials = name.slice(0, 2).toUpperCase();
      var preview = c.last_message ? truncate(c.last_message.body, 46) : 'No messages yet';
      var time = c.last_message ? timeAgo(c.last_message.created_at) : '';
      var unread = c.unread_count > 0
        ? '<span class="msg-unread-badge">' + (c.unread_count > 99 ? '99+' : c.unread_count) + '</span>'
        : '';
      var active = c.id === activeConvId ? ' active' : '';
      return '<div class="msg-conv-item' + active + '" onclick="openConversation(\'' + esc(c.id) + '\')" data-id="' + esc(c.id) + '">' +
        '<div class="msg-avatar" style="background:' + avatarColor(name) + '">' + esc(initials) + '</div>' +
        '<div class="msg-conv-meta">' +
          '<div class="msg-conv-name">' + esc(name) + '</div>' +
          '<div class="msg-conv-preview">' + esc(preview) + '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;">' +
          '<span class="msg-conv-time">' + esc(time) + '</span>' +
          unread +
        '</div>' +
        '</div>';
    }).join('');
  }

  window.filterConversations = function (query) {
    if (!query) { renderConvList(allConvs); return; }
    var q = query.toLowerCase();
    renderConvList(allConvs.filter(function (c) {
      return convDisplayName(c).toLowerCase().includes(q) ||
        (c.last_message && c.last_message.body.toLowerCase().includes(q));
    }));
  };

  function convDisplayName(conv) {
    if (conv.type !== 'direct' && conv.title) return conv.title;
    // For direct: show other participant's name
    var parts = (conv.participants || []).filter(function (p) {
      return String(p.user_id) !== String(ME && ME.id);
    });
    if (parts.length === 0) return 'Me';
    if (parts.length === 1) return parts[0].name || parts[0].username || 'User';
    return parts.map(function (p) { return p.name || p.username; }).join(', ');
  }

  /* ── Open / switch conversation ─────────────────────────────────────────── */
  window.openConversation = async function (convId) {
    activeConvId = convId;
    stopPolling();

    // Highlight sidebar item
    document.querySelectorAll('.msg-conv-item').forEach(function (el) {
      el.classList.toggle('active', el.dataset.id === convId);
    });

    // Mobile: switch to chat view
    document.getElementById('msg-shell').classList.add('chat-open');

    // Show chat panel
    document.getElementById('msg-welcome').style.display = 'none';
    var panel = document.getElementById('msg-chat-panel');
    panel.style.display = 'flex';

    // Load conversation header
    var conv = allConvs.find(function (c) { return c.id === convId; });
    if (!conv) {
      try {
        var r = await fetch('/api/messages/conversations/' + convId, { credentials: 'include' });
        var d = await r.json();
        conv = d.conversation;
      } catch (e) {}
    }
    if (conv) {
      var displayName = convDisplayName(conv);
      document.getElementById('chat-title').textContent = displayName;
      document.getElementById('chat-avatar').textContent = displayName.slice(0, 2).toUpperCase();
      document.getElementById('chat-avatar').style.background = avatarColor(displayName);
      var others = (conv.participants || []).filter(function (p) {
        return String(p.user_id) !== String(ME && ME.id);
      });
      document.getElementById('chat-subtitle').textContent =
        conv.type === 'direct'
          ? (others[0] ? '@' + (others[0].username || '') : '')
          : (conv.participants || []).length + ' participants';
    }

    // Clear and load messages
    var body = document.getElementById('msg-body');
    body.innerHTML = '<div class="msg-load-more" id="load-more-wrap" style="display:none;"><button onclick="loadMoreMessages()">Load older messages</button></div>';
    hasMore = false;
    oldestMsgTimestamp = null;
    lastMsgTimestamp = null;

    await fetchMessages();
    startPolling(convId);
    document.getElementById('msg-input').focus();
  };

  window.closeMobileChat = function () {
    document.getElementById('msg-shell').classList.remove('chat-open');
  };

  /* ── Fetch messages ────────────────────────────────────────────────────── */
  async function fetchMessages() {
    if (!activeConvId) return;
    try {
      var url = '/api/messages/conversations/' + activeConvId + '/messages';
      var res = await fetch(url, { credentials: 'include' });
      var data = await res.json();
      var msgs = data.messages || [];
      hasMore = data.has_more || false;
      document.getElementById('load-more-wrap').style.display = hasMore ? 'block' : 'none';

      var body = document.getElementById('msg-body');
      // Remove existing message rows (keep load-more div)
      Array.from(body.children).forEach(function (el) {
        if (!el.id) el.remove();
      });

      appendMessages(msgs, 'bottom');

      if (msgs.length > 0) {
        lastMsgTimestamp = msgs[msgs.length - 1].created_at;
        oldestMsgTimestamp = msgs[0].created_at;
      }
      scrollToBottom();

      // Update unread in sidebar
      allConvs.forEach(function (c) {
        if (c.id === activeConvId) c.unread_count = 0;
      });
      renderConvList(allConvs);
    } catch (e) {
      console.error('fetchMessages', e);
    }
  }

  window.loadMoreMessages = async function () {
    if (!activeConvId || loadingMore || !oldestMsgTimestamp) return;
    loadingMore = true;
    try {
      var url = '/api/messages/conversations/' + activeConvId + '/messages?before=' + encodeURIComponent(oldestMsgTimestamp);
      var res = await fetch(url, { credentials: 'include' });
      var data = await res.json();
      var msgs = data.messages || [];
      hasMore = data.has_more || false;
      document.getElementById('load-more-wrap').style.display = hasMore ? 'block' : 'none';

      if (msgs.length > 0) {
        var body = document.getElementById('msg-body');
        var loadMoreEl = document.getElementById('load-more-wrap');
        var prevHeight = body.scrollHeight;
        appendMessages(msgs, 'top');
        body.scrollTop = body.scrollHeight - prevHeight;
        oldestMsgTimestamp = msgs[0].created_at;
      }
    } catch (e) {}
    loadingMore = false;
  };

  /* ── Polling ────────────────────────────────────────────────────────────── */
  function startPolling(convId) {
    pollTimer = setInterval(async function () {
      if (!activeConvId) return;
      try {
        var since = lastMsgTimestamp || '1970-01-01';
        var res = await fetch(
          '/api/messages/conversations/' + convId + '/poll?since=' + encodeURIComponent(since),
          { credentials: 'include' }
        );
        var data = await res.json();
        var msgs = data.messages || [];
        if (msgs.length > 0) {
          appendMessages(msgs, 'bottom');
          lastMsgTimestamp = msgs[msgs.length - 1].created_at;
          scrollToBottom();
        }
      } catch (e) {}
    }, 3000);
  }

  function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  /* ── Render messages ────────────────────────────────────────────────────── */
  function appendMessages(msgs, position) {
    var body = document.getElementById('msg-body');
    var loadMoreEl = document.getElementById('load-more-wrap');
    var lastDate = null;

    var fragment = document.createDocumentFragment();

    msgs.forEach(function (msg) {
      var isMine = String(msg.sender_id) === String(ME && ME.id);
      var msgDate = msg.created_at ? msg.created_at.slice(0, 10) : '';

      // Date divider
      if (msgDate && msgDate !== lastDate) {
        var divider = document.createElement('div');
        divider.className = 'msg-date-divider';
        divider.textContent = formatDate(msg.created_at);
        fragment.appendChild(divider);
        lastDate = msgDate;
      }

      // Row
      var row = document.createElement('div');
      row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
      row.dataset.msgId = msg.id;

      if (!isMine) {
        var av = document.createElement('div');
        av.className = 'msg-avatar';
        av.style.width = '28px';
        av.style.height = '28px';
        av.style.fontSize = '.75rem';
        var senderName = msg.name || msg.username || 'User';
        av.textContent = senderName.slice(0, 2).toUpperCase();
        av.style.background = avatarColor(senderName);
        row.appendChild(av);
      }

      var wrap = document.createElement('div');
      wrap.className = 'msg-bubble-wrap';

      if (!isMine) {
        var label = document.createElement('div');
        label.className = 'msg-sender-label';
        label.textContent = msg.name || msg.username || 'User';
        wrap.appendChild(label);
      }

      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.body;
      wrap.appendChild(bubble);

      var meta = document.createElement('div');
      meta.className = 'msg-bubble-meta';
      meta.textContent = formatTime(msg.created_at);
      wrap.appendChild(meta);

      row.appendChild(wrap);
      fragment.appendChild(row);
    });

    if (position === 'top') {
      body.insertBefore(fragment, loadMoreEl ? loadMoreEl.nextSibling : body.firstChild);
    } else {
      body.appendChild(fragment);
    }
  }

  function scrollToBottom() {
    var body = document.getElementById('msg-body');
    body.scrollTop = body.scrollHeight;
  }

  /* ── Send message ────────────────────────────────────────────────────────── */
  window.sendMessage = async function () {
    if (!activeConvId) return;
    var input = document.getElementById('msg-input');
    var text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    document.getElementById('send-btn').disabled = true;

    try {
      var res = await fetch('/api/messages/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ conversation_id: activeConvId, body: text }),
      });
      var data = await res.json();
      if (data.ok && data.message) {
        appendMessages([data.message], 'bottom');
        lastMsgTimestamp = data.message.created_at;
        scrollToBottom();
        // Refresh sidebar preview
        await loadConversations();
      } else {
        showToast(data.error || 'Failed to send', 'error');
      }
    } catch (e) {
      showToast('Network error', 'error');
    }
    document.getElementById('send-btn').disabled = false;
  };

  window.handleComposerKey = function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  window.autoResize = function (el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };

  /* ── New conversation modal ────────────────────────────────────────────── */
  window.openNewConvModal = function () {
    document.getElementById('nc-username').value = '';
    document.getElementById('nc-message').value = '';
    document.getElementById('nc-error').style.display = 'none';
    document.getElementById('new-conv-modal').classList.remove('hidden');
    setTimeout(function () { document.getElementById('nc-username').focus(); }, 50);
  };

  window.closeNewConvModal = function () {
    document.getElementById('new-conv-modal').classList.add('hidden');
  };

  window.startNewConversation = async function () {
    var raw = document.getElementById('nc-username').value.trim();
    var firstMsg = document.getElementById('nc-message').value.trim();
    var errEl = document.getElementById('nc-error');
    errEl.style.display = 'none';

    if (!raw) { errEl.textContent = 'Please enter a username or user ID.'; errEl.style.display = 'block'; return; }

    // Look up user by username
    var recipientId = null;
    try {
      var lookup = await fetch('/api/users/lookup?username=' + encodeURIComponent(raw), { credentials: 'include' });
      var ld = await lookup.json();
      if (ld.ok && ld.user) {
        recipientId = ld.user.id;
      } else if (/^\d+$/.test(raw)) {
        recipientId = parseInt(raw, 10);
      } else {
        errEl.textContent = 'User "' + raw + '" not found.';
        errEl.style.display = 'block';
        return;
      }
    } catch (e) {
      if (/^\d+$/.test(raw)) { recipientId = parseInt(raw, 10); }
      else { errEl.textContent = 'Could not look up user.'; errEl.style.display = 'block'; return; }
    }

    if (String(recipientId) === String(ME && ME.id)) {
      errEl.textContent = "You can't message yourself.";
      errEl.style.display = 'block';
      return;
    }

    try {
      var res = await fetch('/api/messages/conversations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ participant_ids: [recipientId], type: 'direct', message: firstMsg || undefined }),
      });
      var d = await res.json();
      if (d.ok && d.conversation) {
        closeNewConvModal();
        await loadConversations();
        openConversation(d.conversation.id);
      } else {
        errEl.textContent = d.error || 'Failed to create conversation.';
        errEl.style.display = 'block';
      }
    } catch (e) {
      errEl.textContent = 'Network error.';
      errEl.style.display = 'block';
    }
  };

  // Close modal on backdrop click
  document.getElementById('new-conv-modal').addEventListener('click', function (e) {
    if (e.target === this) closeNewConvModal();
  });

  /* ── Helpers ────────────────────────────────────────────────────────────── */
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function truncate(str, n) {
    str = String(str || '');
    return str.length > n ? str.slice(0, n) + '…' : str;
  }

  function timeAgo(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var now = Date.now();
    var diff = Math.floor((now - d.getTime()) / 1000);
    if (diff < 60) return 'now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h';
    return d.toLocaleDateString();
  }

  function formatDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var today = new Date();
    var yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: d.getFullYear() !== today.getFullYear() ? 'numeric' : undefined });
  }

  function formatTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  }

  var AVATAR_COLORS = ['#0f766e','#0369a1','#7c3aed','#b45309','#be185d','#059669','#0891b2','#d97706'];
  function avatarColor(name) {
    var h = 0;
    for (var i = 0; i < (name || '').length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }

  init();
})();
</script>
</body>
</html>
