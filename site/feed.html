<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vendor Feed | Vendor Atlas</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    /* ── SOCIAL FEED LAYOUT ───────────────────────────────────────── */
    body { background: #f4efe6; }

    .feed-shell {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 12px 80px;
    }

    /* sticky filter bar */
    .feed-filter-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #f4efe6;
      border-bottom: 1px solid rgba(19,38,35,0.1);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 0;
      scrollbar-width: none;
    }
    .feed-filter-bar::-webkit-scrollbar { display: none; }
    .feed-pill {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 99px;
      border: 1.5px solid rgba(19,38,35,0.15);
      background: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      color: #54645d;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .feed-pill.active,
    .feed-pill:hover {
      border-color: #0f766e;
      background: rgba(15,118,110,0.1);
      color: #0f766e;
    }

    /* ── POST CARD ─────────────────────────────────────────────────── */
    .feed-post {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 2px 16px rgba(12,31,29,0.08);
    }

    /* vendor header row */
    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
    }
    .post-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
      text-decoration: none;
    }
    .post-vendor-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #132623;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .post-vendor-name:hover { color: #0f766e; }
    .post-vendor-sub {
      font-size: 0.72rem;
      color: #54645d;
      margin-top: 2px;
    }
    .post-info { flex: 1; min-width: 0; }
    .post-verified {
      font-size: 0.65rem;
      font-weight: 700;
      color: #027a48;
      background: rgba(2,122,72,0.1);
      padding: 2px 7px;
      border-radius: 99px;
    }
    .post-follow-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: 1.5px solid #0f766e;
      background: transparent;
      color: #0f766e;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .post-follow-btn:hover { background: rgba(15,118,110,0.1); }
    .post-follow-btn.following {
      border-color: rgba(19,38,35,0.15);
      color: #54645d;
      background: #f4efe6;
    }

    /* MEDIA — square 1:1 like Instagram (or 4:5 portrait) */
    .post-media {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: #e2e8f0;
    }
    .post-media-thumb {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(72px, 20vw, 120px);
      position: relative;
    }
    .post-media-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.5) 100%);
    }
    .post-media-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      z-index: 2;
      color: #fff;
    }
    .post-media-product {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      margin-bottom: 6px;
      color: #fff;
    }
    .post-media-location {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.8);
    }
    .post-play-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      z-index: 3;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      border: 1.5px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #fff;
      padding-left: 2px;
    }

    /* caption */
    .post-caption {
      font-size: 0.9rem;
      line-height: 1.55;
      color: #132623;
      padding: 12px 14px 6px;
      margin: 0;
    }

    /* tags */
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 14px 10px;
    }
    .post-tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }
    .post-tag-event {
      background: rgba(232,159,71,0.14);
      color: #92400e;
    }
    .post-tag-location {
      background: rgba(99,102,241,0.1);
      color: #4338ca;
    }
    .post-tag-plain {
      background: #f4efe6;
      color: #54645d;
      border: 1px solid rgba(19,38,35,0.12);
    }

    /* action bar */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 4px 10px 12px;
      border-top: 1px solid rgba(19,38,35,0.07);
    }
    .post-action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 10px;
      border-radius: 10px;
      border: none;
      background: transparent;
      font-size: 0.82rem;
      font-weight: 600;
      color: #54645d;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .post-action-btn:hover { background: #f4efe6; color: #132623; }
    .post-action-btn.liked { color: #ef4444; }
    .post-action-btn.liked:hover { background: rgba(239,68,68,0.08); }
    .post-action-btn.saved { color: #e89f47; }
    .shop-btn {
      margin-left: auto;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1.5px solid #0f766e;
      background: transparent;
      color: #0f766e;
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .shop-btn:hover { background: rgba(15,118,110,0.1); }

    /* ── SKELETON ──────────────────────────────────────────────────── */
    .skeleton {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 2px 16px rgba(12,31,29,0.08);
    }
    .skel-line {
      background: linear-gradient(90deg, #f0ede8 25%, #e8e4de 50%, #f0ede8 75%);
      background-size: 200% 100%;
      animation: skel-wave 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes skel-wave {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
    .skel-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
    .skel-info { flex: 1; }
    .skel-name { height: 13px; width: 55%; margin-bottom: 7px; }
    .skel-sub { height: 10px; width: 35%; }
    .skel-media { aspect-ratio: 1/1; width: 100%; }
    .skel-body { padding: 12px 14px; }
    .skel-text { height: 11px; width: 85%; margin-bottom: 8px; }
    .skel-text-sm { height: 11px; width: 60%; }

    /* ── EMPTY / ERROR ─────────────────────────────────────────────── */
    .feed-empty {
      text-align: center;
      padding: 60px 24px;
      color: #54645d;
    }
    .feed-empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .feed-empty strong { display: block; font-size: 1.05rem; color: #132623; margin-bottom: 6px; }

    /* ── DEBUG BANNER ──────────────────────────────────────────────── */
    #feed-debug {
      font-family: monospace;
      font-size: 0.72rem;
      background: #fef3c7;
      border-bottom: 2px solid #f59e0b;
      color: #92400e;
      padding: 6px 14px;
      text-align: center;
    }

    /* ── LOAD MORE ─────────────────────────────────────────────────── */
    .feed-load-more {
      text-align: center;
      padding: 8px 0 20px;
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="container nav nav-journey">
        <a class="brand" href="/"><span class="brand-mark">VA</span><span>Vendor Atlas</span></a>
        <nav class="nav-links">
          <a href="/dashboard">Plan</a>
          <a href="/discover">Discover</a>
          <a class="active" href="/feed">Feed</a>
          <a href="/community">Community</a>
          <a href="/final-plan">Profit</a>
        </nav>
        <div class="nav-actions" data-auth-nav></div>
        <button class="hamburger" type="button" data-mobile-toggle aria-label="Open menu"><span></span><span></span><span></span></button>
      </div>
      <div class="container mobile-drawer" data-mobile-drawer>
        <a href="/dashboard">Plan</a>
        <a href="/discover">Discover</a>
        <a href="/feed">Feed</a>
        <a href="/community">Community</a>
        <a href="/final-plan">Profit</a>
        <div data-mobile-auth-nav></div>
      </div>
    </header>

    <div id="feed-debug">⚡ feed v3 — loading…</div>

    <main>
      <div class="feed-shell">
        <!-- Filter pills -->
        <div class="feed-filter-bar" id="filterBar">
          <button class="feed-pill active" data-tag="">✨ For You</button>
          <button class="feed-pill" data-tag="jewelry">💍 Jewelry</button>
          <button class="feed-pill" data-tag="ceramics">🏺 Ceramics</button>
          <button class="feed-pill" data-tag="food">🍯 Food</button>
          <button class="feed-pill" data-tag="candles">🕯️ Candles</button>
          <button class="feed-pill" data-tag="art">🎨 Art</button>
          <button class="feed-pill" data-tag="vintage">🪴 Vintage</button>
        </div>

        <!-- Posts render here -->
        <div id="feedPosts">
          <!-- Skeleton placeholders visible immediately -->
          <div class="skeleton" id="sk1">
            <div class="skel-header">
              <div class="skel-line skel-avatar"></div>
              <div class="skel-info">
                <div class="skel-line skel-name"></div>
                <div class="skel-line skel-sub"></div>
              </div>
            </div>
            <div class="skel-line skel-media"></div>
            <div class="skel-body">
              <div class="skel-line skel-text"></div>
              <div class="skel-line skel-text-sm"></div>
            </div>
          </div>
          <div class="skeleton" id="sk2">
            <div class="skel-header">
              <div class="skel-line skel-avatar"></div>
              <div class="skel-info">
                <div class="skel-line skel-name"></div>
                <div class="skel-line skel-sub"></div>
              </div>
            </div>
            <div class="skel-line skel-media"></div>
            <div class="skel-body">
              <div class="skel-line skel-text"></div>
              <div class="skel-line skel-text-sm"></div>
            </div>
          </div>
          <div class="skeleton" id="sk3">
            <div class="skel-header">
              <div class="skel-line skel-avatar"></div>
              <div class="skel-info">
                <div class="skel-line skel-name"></div>
                <div class="skel-line skel-sub"></div>
              </div>
            </div>
            <div class="skel-line skel-media"></div>
          </div>
        </div>

        <div class="feed-load-more" id="loadMoreWrap" style="display:none;">
          <button class="btn btn-secondary" id="loadMoreBtn">Load more posts</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    'use strict';

    var feedPosts  = document.getElementById('feedPosts');
    var filterBar  = document.getElementById('filterBar');
    var loadMoreW  = document.getElementById('loadMoreWrap');
    var loadMoreB  = document.getElementById('loadMoreBtn');
    var debugEl    = document.getElementById('feed-debug');

    var tag     = '';
    var offset  = 0;
    var PAGE    = 10;
    var busy    = false;
    var likedSet    = new Set();
    var savedSet    = new Set();
    var followingSet = new Set();

    function dbg(msg) {
      if (debugEl) debugEl.textContent = '⚡ feed v3 — ' + msg;
    }

    // ── helpers ─────────────────────────────────────────────
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1)+'K' : String(n || 0); }
    function darken(hex) {
      try {
        var n = parseInt((hex || '#0f766e').replace('#',''), 16);
        var r = Math.max(0, (n >> 16) - 50);
        var g = Math.max(0, ((n >> 8) & 0xff) - 50);
        var b = Math.max(0, (n & 0xff) - 50);
        return '#' + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
      } catch(e) { return '#0b5b55'; }
    }

    // ── build one post card ──────────────────────────────────
    function buildPost(p) {
      var color  = p.thumbnail_color || '#0f766e';
      var dark   = darken(color);
      var emoji  = p.thumbnail_emoji || '🛍️';
      var init   = (p.vendor_name || p.vendor_username || 'V')[0].toUpperCase();
      var uname  = esc(p.vendor_username || '');
      var isLiked   = likedSet.has(p.id);
      var isSaved   = savedSet.has(p.id);
      var isFollow  = followingSet.has(p.vendor_username || '');

      var tags = '';
      if (p.event_name)  tags += '<span class="post-tag post-tag-event">🗓 '+esc(p.event_name)+'</span>';
      if (p.location)    tags += '<span class="post-tag post-tag-location">📍 '+esc(p.location)+'</span>';
      (p.tags || []).slice(0,3).forEach(function(t){ tags += '<span class="post-tag post-tag-plain">#'+esc(t)+'</span>'; });

      var productOverlay = p.product_name
        ? '<div class="post-media-product">🛍 '+esc(p.product_name)+(p.product_price ? '  $'+p.product_price : '')+'</div>'
        : '';
      var locationOverlay = p.location
        ? '<div class="post-media-location">📍 '+esc(p.location)+'</div>'
        : '';

      return (
        '<div class="feed-post" data-post-id="'+esc(p.id)+'">'+
          '<div class="post-header">'+
            '<a class="post-avatar" href="/vendor-shop?u='+encodeURIComponent(p.vendor_username||'')+'" style="background:linear-gradient(135deg,'+esc(color)+','+esc(dark)+')">'+esc(init)+'</a>'+
            '<div class="post-info">'+
              '<a class="post-vendor-name" href="/vendor-shop?u='+encodeURIComponent(p.vendor_username||'')+'">'+
                esc(p.vendor_name || p.vendor_username)+
                (p.vendor_verified ? ' <span class="post-verified">✓ Verified</span>' : '')+
              '</a>'+
              '<div class="post-vendor-sub">@'+uname+(p.location ? '  ·  '+esc(p.location) : '')+'</div>'+
            '</div>'+
            '<button class="post-follow-btn'+(isFollow?' following':'')+'" data-follow="'+uname+'">'+
              (isFollow ? 'Following' : '+ Follow')+
            '</button>'+
          '</div>'+

          '<div class="post-media" data-media="'+esc(p.id)+'">'+
            '<div class="post-media-thumb" style="background:linear-gradient(145deg,'+esc(color)+','+esc(dark)+')">'+esc(emoji)+'</div>'+
            '<div class="post-play-btn">▶</div>'+
            '<div class="post-media-overlay">'+productOverlay+locationOverlay+'</div>'+
          '</div>'+

          (p.caption ? '<p class="post-caption">'+esc(p.caption)+'</p>' : '')+
          (tags ? '<div class="post-tags">'+tags+'</div>' : '')+

          '<div class="post-actions">'+
            '<button class="post-action-btn'+(isLiked?' liked':'')+'" data-like="'+esc(p.id)+'">'+
              '<span>❤️</span><span class="like-count" id="lc-'+esc(p.id)+'">'+fmt(p.likes_count)+'</span>'+
            '</button>'+
            '<button class="post-action-btn'+(isSaved?' saved':'')+'" data-save="'+esc(p.id)+'">'+
              '<span>🔖</span><span class="save-count" id="sc-'+esc(p.id)+'">'+fmt(p.saves_count)+'</span>'+
            '</button>'+
            '<button class="post-action-btn" data-share="'+esc(p.id)+'" data-share-name="'+uname+'">'+
              '<span>↗️</span> Share'+
            '</button>'+
            (p.vendor_username ? '<a class="shop-btn" href="/vendor-shop?u='+encodeURIComponent(p.vendor_username)+'">🏪 Shop</a>' : '')+
          '</div>'+
        '</div>'
      );
    }

    // ── wire handlers after injecting HTML ───────────────────
    function wirePost(p) {
      var card = feedPosts.querySelector('[data-post-id="'+p.id+'"]');
      if (!card) return;

      // like
      var likeBtn = card.querySelector('[data-like]');
      if (likeBtn) likeBtn.addEventListener('click', function () {
        var wasLiked = likedSet.has(p.id);
        if (wasLiked) likedSet.delete(p.id); else likedSet.add(p.id);
        likeBtn.className = 'post-action-btn' + (likedSet.has(p.id) ? ' liked' : '');
        var el = document.getElementById('lc-'+p.id);
        if (el) el.textContent = fmt((p.likes_count || 0) + (likedSet.has(p.id) ? 1 : 0));
        fetch('/api/feed/posts/'+p.id+'/like', { method:'POST', credentials:'include' }).catch(function(){});
      });

      // save
      var saveBtn = card.querySelector('[data-save]');
      if (saveBtn) saveBtn.addEventListener('click', function () {
        var wasSaved = savedSet.has(p.id);
        if (wasSaved) savedSet.delete(p.id); else savedSet.add(p.id);
        saveBtn.className = 'post-action-btn' + (savedSet.has(p.id) ? ' saved' : '');
        var el = document.getElementById('sc-'+p.id);
        if (el) el.textContent = fmt((p.saves_count || 0) + (savedSet.has(p.id) ? 1 : 0));
        fetch('/api/feed/posts/'+p.id+'/save', { method:'POST', credentials:'include' }).catch(function(){});
      });

      // share
      var shareBtn = card.querySelector('[data-share]');
      if (shareBtn) shareBtn.addEventListener('click', function () {
        var url = location.origin + '/vendor-shop?u=' + encodeURIComponent(shareBtn.dataset.shareName || '');
        if (navigator.share) {
          navigator.share({ title: p.vendor_name || 'Vendor', url: url }).catch(function(){});
        } else {
          navigator.clipboard.writeText(url).then(function () {
            shareBtn.textContent = '✓ Copied';
            setTimeout(function () { shareBtn.innerHTML = '<span>↗️</span> Share'; }, 1800);
          }).catch(function(){});
        }
      });

      // follow
      var followBtn = card.querySelector('[data-follow]');
      if (followBtn) followBtn.addEventListener('click', function () {
        var uname = followBtn.dataset.follow;
        var isF = followingSet.has(uname);
        if (isF) followingSet.delete(uname); else followingSet.add(uname);
        followBtn.className = 'post-follow-btn' + (followingSet.has(uname) ? ' following' : '');
        followBtn.textContent = followingSet.has(uname) ? 'Following' : '+ Follow';
        var method = isF ? 'DELETE' : 'POST';
        fetch('/api/vendors/'+encodeURIComponent(uname)+'/follow', { method: method, credentials:'include' }).catch(function(){});
      });
    }

    // ── load posts from API ──────────────────────────────────
    function loadPosts(reset) {
      if (busy) return;
      busy = true;
      if (reset) {
        offset = 0;
        // show skeletons while loading
        feedPosts.innerHTML =
          '<div class="skeleton"><div class="skel-header"><div class="skel-line skel-avatar"></div><div class="skel-info"><div class="skel-line skel-name"></div><div class="skel-line skel-sub"></div></div></div><div class="skel-line skel-media"></div><div class="skel-body"><div class="skel-line skel-text"></div></div></div>'+
          '<div class="skeleton"><div class="skel-header"><div class="skel-line skel-avatar"></div><div class="skel-info"><div class="skel-line skel-name"></div><div class="skel-line skel-sub"></div></div></div><div class="skel-line skel-media"></div></div>';
        loadMoreW.style.display = 'none';
      }

      var url = '/api/feed?limit='+PAGE+'&offset='+offset;
      if (tag) url += '&tag='+encodeURIComponent(tag);
      dbg('fetching ' + url);

      fetch(url, { credentials: 'include' })
        .then(function (r) {
          dbg('API ' + r.status + ' from ' + url);
          return r.json();
        })
        .then(function (data) {
          dbg('posts=' + (data.posts||[]).length + ' ok=' + data.ok);
          var posts = data.posts || [];
          if (reset) feedPosts.innerHTML = '';

          if (!posts.length && offset === 0) {
            feedPosts.innerHTML =
              '<div class="feed-empty"><div class="icon">🛍️</div>'+
              '<strong>No posts yet.</strong><p>Vendors will start posting after the next market!</p></div>';
          } else {
            posts.forEach(function (p) {
              feedPosts.insertAdjacentHTML('beforeend', buildPost(p));
              wirePost(p);
            });
            offset += posts.length;
            loadMoreW.style.display = posts.length === PAGE ? 'block' : 'none';
          }
        })
        .catch(function (err) {
          dbg('ERROR: ' + (err && err.message ? err.message : String(err)));
          if (offset === 0) {
            feedPosts.innerHTML =
              '<div class="feed-empty"><div class="icon">⚠️</div>'+
              '<strong>Could not load posts.</strong><p>Check your connection and refresh.</p></div>';
          }
        })
        .finally(function () { busy = false; });
    }

    // ── filter pills ─────────────────────────────────────────
    if (filterBar) {
      filterBar.addEventListener('click', function (e) {
        var pill = e.target.closest('[data-tag]');
        if (!pill) return;
        filterBar.querySelectorAll('.feed-pill').forEach(function (p) { p.classList.remove('active'); });
        pill.classList.add('active');
        tag = pill.dataset.tag || '';
        loadPosts(true);
      });
    }

    // ── load more ────────────────────────────────────────────
    if (loadMoreB) loadMoreB.addEventListener('click', function () { loadPosts(false); });

    // ── load user state ──────────────────────────────────────
    fetch('/api/auth/me', { credentials: 'include' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.user) {
          Promise.all([
            fetch('/api/feed/my-likes', { credentials:'include' }).then(function(r){ return r.json(); }).catch(function(){ return {}; }),
            fetch('/api/feed/my-saves', { credentials:'include' }).then(function(r){ return r.json(); }).catch(function(){ return {}; }),
          ]).then(function (res) {
            (res[0].post_ids || []).forEach(function (id) { likedSet.add(id); });
            (res[1].post_ids || []).forEach(function (id) { savedSet.add(id); });
          });
        }
      }).catch(function(){});

    // ── kick off ─────────────────────────────────────────────
    loadPosts(true);
  })();
  </script>
</body>
</html>
