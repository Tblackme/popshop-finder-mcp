<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Feed | Vendor Atlas</title>
  <style>
    /* ═══════════════════════════════════════════════
       RESET & ROOT
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff;
      --black: #000000;
      --brand: #0f766e;
      --accent: #e89f47;
      --verified: #4ade80;
      --radius: 14px;
    }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    /* ═══════════════════════════════════════════════
       HEADER — fixed, overlays feed
    ═══════════════════════════════════════════════ */
    #feedHeader {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      padding: env(safe-area-inset-top, 0) 0 0;
      pointer-events: none; /* clicks pass through to feed */
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 4px;
      pointer-events: none;
    }
    .header-logo {
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
      pointer-events: all;
      text-decoration: none;
    }
    .header-auth {
      pointer-events: all;
      display: flex; gap: 8px; align-items: center;
    }
    .header-auth a, .header-auth button {
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 5px 12px;
      border-radius: 99px;
    }

    /* TABS */
    .feed-tabs {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 6px 16px 8px;
      pointer-events: all;
      position: relative;
    }
    .feed-tab {
      font-size: 0.88rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      padding: 4px 2px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .feed-tab.active {
      color: #fff;
      border-bottom-color: #fff;
    }
    /* top gradient for header readability */
    #feedHeader::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 140px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════
       FEED VIEWPORT — vertical scroll snap
    ═══════════════════════════════════════════════ */
    #feedViewport {
      position: fixed;
      inset: 0;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    #feedViewport::-webkit-scrollbar { display: none; }

    /* ═══════════════════════════════════════════════
       FEED ITEM — one per post, full viewport height
    ═══════════════════════════════════════════════ */
    .feed-item {
      position: relative;
      width: 100%;
      height: 100dvh;
      height: 100vh; /* fallback */
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── MEDIA / VIDEO AREA ─── */
    .media-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .media-emoji {
      font-size: clamp(80px, 24vw, 140px);
      line-height: 1;
      z-index: 1;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.4));
      user-select: none;
    }
    /* Playing state: slow zoom animation */
    .feed-item.playing .media-emoji {
      animation: zoom-breathe 4s ease-in-out infinite alternate;
    }
    @keyframes zoom-breathe {
      0%   { transform: scale(1); }
      100% { transform: scale(1.08); }
    }
    /* Shimmer sweep (simulates video scan lines) */
    .media-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        130deg,
        transparent 30%,
        rgba(255,255,255,0.04) 50%,
        transparent 70%
      );
      background-size: 200% 200%;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .feed-item.playing .media-shimmer {
      opacity: 1;
      animation: shimmer-sweep 3s linear infinite;
    }
    @keyframes shimmer-sweep {
      0%   { background-position: 200% 200%; }
      100% { background-position: -200% -200%; }
    }
    /* Tap-to-pause overlay */
    .tap-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      cursor: pointer;
    }
    .pause-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      z-index: 6;
    }
    .pause-icon.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* ─── PROGRESS BAR ─── */
    .progress-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.2);
      z-index: 10;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      transition: width 0.1s linear;
    }
    .feed-item.playing .progress-fill {
      animation: progress-run 8s linear forwards;
    }
    @keyframes progress-run {
      from { width: 0%; }
      to   { width: 100%; }
    }

    /* ─── BOTTOM GRADIENT + INFO ─── */
    .bottom-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 72px; /* leave room for action bar */
      padding: 20px 16px;
      padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
      z-index: 20;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.55) 55%,
        transparent 100%
      );
    }
    /* Context button (View Event / Near You / Watch Live) */
    .context-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }
    .context-btn:hover, .context-btn:active { background: rgba(255,255,255,0.24); }
    .context-btn.live {
      background: rgba(239, 68, 68, 0.75);
      border-color: rgba(239,68,68,0.5);
      animation: pulse-live 1.8s ease-in-out infinite;
    }
    @keyframes pulse-live {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
      50%       { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fff;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Vendor name row */
    .vendor-name-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
    }
    .vendor-handle {
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
    .vendor-handle:hover { text-decoration: underline; }
    .verified-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.65rem;
      font-weight: 700;
      color: #000;
      background: var(--verified);
      padding: 2px 7px;
      border-radius: 99px;
    }

    /* Caption — expandable */
    .caption-wrap { margin-bottom: 10px; }
    .caption-text {
      font-size: 0.88rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 1px 3px rgba(0,0,0,.5);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: all 0.3s;
    }
    .caption-text.expanded {
      -webkit-line-clamp: unset;
    }
    .caption-more {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      margin-top: 2px;
    }

    /* Location / event tags */
    .info-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }
    .info-tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.1);
    }
    .info-tag.event-tag { border-color: rgba(232,159,71,0.5); color: #fbbf24; }
    .info-tag.location-tag { border-color: rgba(99,102,241,0.5); color: #a5b4fc; }

    /* ─── RIGHT ACTION BAR ─── */
    .action-bar {
      position: absolute;
      right: 10px;
      bottom: 80px;
      z-index: 25;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .action-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .action-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: #fff;
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s;
    }
    .action-btn:active { transform: scale(0.88); }
    .action-btn.liked   { background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.5); }
    .action-btn.saved   { background: rgba(232,159,71,0.3); border-color: rgba(232,159,71,0.5); }
    .action-count {
      font-size: 0.68rem;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 3px rgba(0,0,0,.5);
    }

    /* Vendor avatar in action bar */
    .action-vendor-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.1rem;
      color: #fff;
      border: 2px solid #fff;
      text-decoration: none;
      position: relative;
    }
    .action-follow-plus {
      position: absolute;
      bottom: -6px;
      left: 50%; transform: translateX(-50%);
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #000;
      font-size: 0.85rem;
      font-weight: 900;
      color: #000;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      transition: transform 0.15s;
    }
    .action-follow-plus:active { transform: translateX(-50%) scale(0.85); }
    .action-follow-plus.following { background: rgba(255,255,255,0.3); color: #fff; font-size: 0.7rem; }

    /* ─── PRODUCT CARD ─── */
    .product-card {
      position: absolute;
      right: 12px;
      bottom: 200px; /* sits above action bar */
      z-index: 30;
      width: 160px;
      background: rgba(18,18,18,0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      overflow: hidden;
      transform: translateX(calc(100% + 20px));
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      cursor: pointer;
    }
    .product-card.visible {
      transform: translateX(0);
      opacity: 1;
    }
    .product-card-media {
      width: 100%;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
    }
    .product-card-body {
      padding: 8px 10px 10px;
    }
    .product-card-name {
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-card-price {
      font-size: 0.82rem;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .product-card-btn {
      display: block;
      width: 100%;
      padding: 6px;
      background: var(--brand);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 8px;
      text-align: center;
      transition: background 0.15s;
    }
    .product-card-btn:hover { background: #0b5b55; }
    .product-card-dismiss {
      position: absolute;
      top: 6px; right: 6px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      color: rgba(255,255,255,0.7);
      font-size: 0.7rem;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── SKELETON ITEMS ─── */
    .feed-skeleton {
      position: relative;
      width: 100%; height: 100dvh; height: 100vh;
      scroll-snap-align: start;
      background: #111;
    }
    .skel-bg {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: skel-wave 1.4s infinite;
    }
    @keyframes skel-wave { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ─── EMPTY / ERROR ─── */
    .feed-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100dvh; height: 100vh;
      scroll-snap-align: start;
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 40px;
    }
    .feed-empty .icon { font-size: 3rem; margin-bottom: 16px; }
    .feed-empty strong { color: #fff; font-size: 1.1rem; display: block; margin-bottom: 8px; }

    /* ─── LOADER (end of feed) ─── */
    .feed-loader {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader-spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── COMMENT DRAWER (slide up) ─── */
    .comment-drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 400;
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      padding: 16px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 65vh;
      overflow-y: auto;
    }
    .comment-drawer.open { transform: translateY(0); }
    .comment-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      margin: 0 auto 16px;
    }
    .comment-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      text-align: center;
    }
    .comment-placeholder {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      padding: 24px 0;
    }
    .comment-close {
      position: absolute;
      top: 14px; right: 14px;
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
    }
    .drawer-backdrop {
      display: none;
      position: fixed; inset: 0;
      z-index: 399;
      background: rgba(0,0,0,0.5);
    }
    .drawer-backdrop.open { display: block; }

    /* ─── DEBUG ─── */
    #feedDebug {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 999;
      background: rgba(245,158,11,0.9);
      color: #000;
      font-family: monospace;
      font-size: 0.65rem;
      padding: 3px 10px;
      text-align: center;
      display: none; /* shown by JS after first load */
    }
  </style>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────── -->
  <div id="feedHeader">
    <div class="header-top">
      <a class="header-logo" href="/">VA</a>
      <div class="header-auth" id="headerAuth">
        <a href="/signin">Sign In</a>
      </div>
    </div>
    <div class="feed-tabs" id="feedTabs">
      <button class="feed-tab" data-feed="following">Following</button>
      <button class="feed-tab active" data-feed="foryou">For You</button>
      <button class="feed-tab" data-feed="nearby">Near You</button>
      <button class="feed-tab" data-feed="live">🔴 Live</button>
    </div>
  </div>

  <!-- ── VERTICAL FEED ──────────────────────────────── -->
  <div id="feedViewport">
    <!-- skeleton placeholders before JS runs -->
    <div class="feed-skeleton" id="sk0"><div class="skel-bg"></div></div>
    <div class="feed-skeleton" id="sk1"><div class="skel-bg"></div></div>
    <div class="feed-skeleton" id="sk2"><div class="skel-bg"></div></div>
    <div class="feed-loader" id="feedLoader"><div class="loader-spinner"></div></div>
  </div>

  <!-- ── COMMENT DRAWER ─────────────────────────────── -->
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <div class="comment-drawer" id="commentDrawer">
    <div class="comment-handle"></div>
    <div class="comment-title" id="commentTitle">Comments</div>
    <button class="comment-close" id="commentClose">✕</button>
    <div class="comment-placeholder">💬 Comments coming soon.<br>Be the first to share your thoughts!</div>
  </div>

  <!-- ── DEBUG ──────────────────────────────────────── -->
  <div id="feedDebug"></div>

  <script src="/assets/app.js"></script>
  <script>
  (function () {
    'use strict';

    /* ── CONSTANTS ─────────────────────────────────── */
    var PAGE      = 8;
    var viewport  = document.getElementById('feedViewport');
    var loader    = document.getElementById('feedLoader');
    var tabsEl    = document.getElementById('feedTabs');
    var authEl    = document.getElementById('headerAuth');
    var debugEl   = document.getElementById('feedDebug');
    var drawer    = document.getElementById('commentDrawer');
    var backdrop  = document.getElementById('drawerBackdrop');
    var commentTitle = document.getElementById('commentTitle');

    var offset    = 0;
    var activeTab = 'foryou';
    var busy      = false;
    var exhausted = false;
    var paused    = false;
    var currentItem = null;

    var likedSet    = new Set();
    var savedSet    = new Set();
    var followingSet = new Set();

    /* ── HELPERS ───────────────────────────────────── */
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmt(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : String(n | 0); }
    function darken(hex) {
      try {
        var n = parseInt((hex || '#0f766e').replace('#', ''), 16);
        var r = Math.max(0, (n >> 16) - 60);
        var g = Math.max(0, ((n >> 8) & 0xff) - 60);
        var b = Math.max(0, (n & 0xff) - 60);
        return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
      } catch (e) { return '#062e2a'; }
    }
    function dbg(msg) {
      if (debugEl) {
        debugEl.style.display = 'block';
        debugEl.textContent = '⚡ v4 — ' + msg;
      }
    }

    /* ── SMART CONTEXT BUTTON ──────────────────────── */
    function contextBtn(post) {
      // live simulation: ~15% of posts
      if (Math.random() < 0.15) {
        return '<span class="context-btn live" style="margin-bottom:10px;display:inline-flex;">' +
               '<span class="live-dot"></span> Watch Live</span>';
      }
      if (post.event_name) {
        return '<a class="context-btn" href="/discover" style="margin-bottom:10px;">🗓 ' + esc(post.event_name) + '</a>';
      }
      if (post.location) {
        return '<span class="context-btn" style="margin-bottom:10px;">📍 Near You — ' + esc(post.location) + '</span>';
      }
      return '';
    }

    /* ── BUILD ONE FEED ITEM ───────────────────────── */
    function buildItem(p) {
      var color  = p.thumbnail_color || '#0f766e';
      var dark   = darken(color);
      var emoji  = p.thumbnail_emoji || '🛍️';
      var init   = (p.vendor_name || p.vendor_username || 'V')[0].toUpperCase();
      var uname  = p.vendor_username || '';
      var isLiked   = likedSet.has(p.id);
      var isSaved   = savedSet.has(p.id);
      var isFollowing = followingSet.has(uname);

      /* product card (only if product exists) */
      var productCard = '';
      if (p.product_name) {
        productCard =
          '<div class="product-card" id="pc-' + esc(p.id) + '">' +
          '  <button class="product-card-dismiss" data-dismiss-product="' + esc(p.id) + '">✕</button>' +
          '  <div class="product-card-media" style="background:linear-gradient(135deg,' + esc(color) + ',' + esc(dark) + ')">' + esc(emoji) + '</div>' +
          '  <div class="product-card-body">' +
          '    <div class="product-card-name">' + esc(p.product_name) + '</div>' +
          (p.product_price ? '<div class="product-card-price">$' + esc(String(p.product_price)) + '</div>' : '') +
          '    <a class="product-card-btn" href="/vendor-shop?u=' + encodeURIComponent(uname) + '">View Product →</a>' +
          '  </div>' +
          '</div>';
      }

      /* location/event info tags */
      var tags = '';
      if (p.event_name)  tags += '<span class="info-tag event-tag">🗓 ' + esc(p.event_name) + '</span>';
      if (p.location)    tags += '<span class="info-tag location-tag">📍 ' + esc(p.location) + '</span>';
      (p.tags || []).slice(0, 2).forEach(function (t) {
        tags += '<span class="info-tag">#' + esc(t) + '</span>';
      });

      return (
        '<div class="feed-item" data-post-id="' + esc(p.id) + '" data-vendor="' + esc(uname) + '">' +

        /* progress */
        '  <div class="progress-bar"><div class="progress-fill"></div></div>' +

        /* media */
        '  <div class="media-bg" style="background:linear-gradient(160deg,' + esc(color) + ' 0%,' + esc(dark) + ' 100%)">' +
        '    <div class="media-emoji">' + esc(emoji) + '</div>' +
        '    <div class="media-shimmer"></div>' +
        '  </div>' +

        /* tap overlay */
        '  <div class="tap-overlay" data-tap-media="' + esc(p.id) + '"></div>' +
        '  <div class="pause-icon" id="pi-' + esc(p.id) + '">⏸</div>' +

        /* product card */
        productCard +

        /* right action bar */
        '  <div class="action-bar">' +
        /* vendor avatar */
        '    <div class="action-item">' +
        '      <a class="action-vendor-avatar" href="/vendor-shop?u=' + encodeURIComponent(uname) + '" style="background:linear-gradient(135deg,' + esc(color) + ',' + esc(dark) + ')">' + esc(init) + '</a>' +
        '      <button class="action-follow-plus ' + (isFollowing ? 'following' : '') + '" data-follow="' + esc(uname) + '">' + (isFollowing ? '✓' : '+') + '</button>' +
        '    </div>' +
        /* like */
        '    <div class="action-item">' +
        '      <button class="action-btn ' + (isLiked ? 'liked' : '') + '" data-like="' + esc(p.id) + '">❤️</button>' +
        '      <span class="action-count" id="lc-' + esc(p.id) + '">' + fmt(p.likes_count) + '</span>' +
        '    </div>' +
        /* comment */
        '    <div class="action-item">' +
        '      <button class="action-btn" data-comment="' + esc(p.id) + '" data-vendor-name="' + esc(p.vendor_name || uname) + '">💬</button>' +
        '      <span class="action-count">Comment</span>' +
        '    </div>' +
        /* save */
        '    <div class="action-item">' +
        '      <button class="action-btn ' + (isSaved ? 'saved' : '') + '" data-save="' + esc(p.id) + '">🔖</button>' +
        '      <span class="action-count" id="sc-' + esc(p.id) + '">' + fmt(p.saves_count) + '</span>' +
        '    </div>' +
        /* share */
        '    <div class="action-item">' +
        '      <button class="action-btn" data-share="' + esc(p.id) + '" data-share-name="' + esc(uname) + '">↗️</button>' +
        '      <span class="action-count">Share</span>' +
        '    </div>' +
        '  </div>' +

        /* bottom info overlay */
        '  <div class="bottom-overlay">' +
        '    ' + contextBtn(p) +
        '    <div class="vendor-name-row">' +
        '      <a class="vendor-handle" href="/vendor-shop?u=' + encodeURIComponent(uname) + '">@' + esc(uname) + '</a>' +
        (p.vendor_verified ? '      <span class="verified-chip">✓ Verified</span>' : '') +
        '    </div>' +
        (p.caption ?
          '    <div class="caption-wrap">' +
          '      <div class="caption-text" id="cap-' + esc(p.id) + '">' + esc(p.caption) + '</div>' +
          '      <span class="caption-more" data-expand-cap="' + esc(p.id) + '">more</span>' +
          '    </div>' : '') +
        (tags ? '    <div class="info-tags">' + tags + '</div>' : '') +
        '  </div>' +

        '</div>'
      );
    }

    /* ── WIRE HANDLERS ─────────────────────────────── */
    function wireItem(item, p) {
      /* tap to pause */
      var tapEl = item.querySelector('[data-tap-media]');
      var pauseIcon = item.querySelector('.pause-icon');
      var pauseTimer;
      if (tapEl) tapEl.addEventListener('click', function () {
        paused = !paused;
        if (paused) {
          item.classList.remove('playing');
          if (pauseIcon) {
            pauseIcon.textContent = '▶';
            pauseIcon.classList.add('show');
          }
        } else {
          item.classList.add('playing');
          if (pauseIcon) {
            pauseIcon.textContent = '⏸';
            pauseIcon.classList.add('show');
            clearTimeout(pauseTimer);
            pauseTimer = setTimeout(function () { pauseIcon.classList.remove('show'); }, 800);
          }
        }
      });

      /* like */
      var likeBtn = item.querySelector('[data-like]');
      if (likeBtn) likeBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var was = likedSet.has(p.id);
        if (was) likedSet.delete(p.id); else likedSet.add(p.id);
        likeBtn.className = 'action-btn' + (likedSet.has(p.id) ? ' liked' : '');
        likeBtn.style.transform = 'scale(1.35)';
        setTimeout(function () { likeBtn.style.transform = ''; }, 200);
        var cnt = document.getElementById('lc-' + p.id);
        if (cnt) cnt.textContent = fmt((p.likes_count | 0) + (likedSet.has(p.id) ? 1 : 0));
        fetch('/api/feed/posts/' + p.id + '/like', { method: 'POST', credentials: 'include' }).catch(function(){});
      });

      /* save */
      var saveBtn = item.querySelector('[data-save]');
      if (saveBtn) saveBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var was = savedSet.has(p.id);
        if (was) savedSet.delete(p.id); else savedSet.add(p.id);
        saveBtn.className = 'action-btn' + (savedSet.has(p.id) ? ' saved' : '');
        saveBtn.style.transform = 'scale(1.35)';
        setTimeout(function () { saveBtn.style.transform = ''; }, 200);
        var cnt = document.getElementById('sc-' + p.id);
        if (cnt) cnt.textContent = fmt((p.saves_count | 0) + (savedSet.has(p.id) ? 1 : 0));
        fetch('/api/feed/posts/' + p.id + '/save', { method: 'POST', credentials: 'include' }).catch(function(){});
      });

      /* comment */
      var commentBtn = item.querySelector('[data-comment]');
      if (commentBtn) commentBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var vname = commentBtn.dataset.vendorName || '';
        commentTitle.textContent = vname ? 'Comments — ' + vname : 'Comments';
        drawer.classList.add('open');
        backdrop.classList.add('open');
      });

      /* share */
      var shareBtn = item.querySelector('[data-share]');
      if (shareBtn) shareBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var url = location.origin + '/vendor-shop?u=' + encodeURIComponent(shareBtn.dataset.shareName || '');
        var title = (p.vendor_name || p.vendor_username || 'Vendor') + ' on Vendor Atlas';
        if (navigator.share) {
          navigator.share({ title: title, url: url }).catch(function(){});
        } else {
          navigator.clipboard.writeText(url).then(function () {
            var cnt = shareBtn.nextElementSibling;
            if (cnt) { var prev = cnt.textContent; cnt.textContent = 'Copied!'; setTimeout(function () { cnt.textContent = prev; }, 1500); }
          }).catch(function(){});
        }
      });

      /* follow */
      var followBtn = item.querySelector('[data-follow]');
      if (followBtn) followBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var u = followBtn.dataset.follow;
        var isF = followingSet.has(u);
        if (isF) followingSet.delete(u); else followingSet.add(u);
        followBtn.className = 'action-follow-plus' + (followingSet.has(u) ? ' following' : '');
        followBtn.textContent = followingSet.has(u) ? '✓' : '+';
        followBtn.style.transform = 'translateX(-50%) scale(1.3)';
        setTimeout(function () { followBtn.style.transform = 'translateX(-50%)'; }, 200);
        var method = isF ? 'DELETE' : 'POST';
        fetch('/api/vendors/' + encodeURIComponent(u) + '/follow', { method: method, credentials: 'include' }).catch(function(){});
      });

      /* expand caption */
      var capMore = item.querySelector('[data-expand-cap]');
      if (capMore) capMore.addEventListener('click', function (e) {
        e.stopPropagation();
        var capEl = document.getElementById('cap-' + p.id);
        if (capEl) {
          capEl.classList.toggle('expanded');
          capMore.textContent = capEl.classList.contains('expanded') ? 'less' : 'more';
        }
      });

      /* dismiss product card */
      var dismissBtn = item.querySelector('[data-dismiss-product]');
      if (dismissBtn) dismissBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var pc = document.getElementById('pc-' + p.id);
        if (pc) { pc.style.transition = 'transform 0.3s, opacity 0.3s'; pc.classList.remove('visible'); }
      });
    }

    /* ── INTERSECTION OBSERVER — play current item ─ */
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        var item = entry.target;
        if (entry.isIntersecting) {
          /* deactivate previous */
          if (currentItem && currentItem !== item) {
            currentItem.classList.remove('playing');
            var pi = currentItem.querySelector('.pause-icon');
            if (pi) pi.classList.remove('show');
            /* hide product card on previous */
            var prevPc = currentItem.querySelector('.product-card');
            if (prevPc) prevPc.classList.remove('visible');
            /* restart progress bar */
            var pf = currentItem.querySelector('.progress-fill');
            if (pf) { pf.style.animation = 'none'; void pf.offsetWidth; }
          }
          currentItem = item;
          paused = false;
          item.classList.add('playing');

          /* show product card with delay */
          var pc = item.querySelector('.product-card');
          if (pc) {
            setTimeout(function () { pc.classList.add('visible'); }, 900);
          }

          /* preload next batch */
          var items = viewport.querySelectorAll('.feed-item');
          var idx = Array.prototype.indexOf.call(items, item);
          if (idx >= items.length - 3 && !busy && !exhausted) {
            loadPosts(false);
          }
        } else {
          item.classList.remove('playing');
        }
      });
    }, { threshold: 0.7, root: viewport });

    /* ── LOAD POSTS ────────────────────────────────── */
    function removeSkeleton() {
      ['sk0','sk1','sk2'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.remove();
      });
    }

    function loadPosts(reset) {
      if (busy) return;
      busy = true;
      if (reset) { offset = 0; exhausted = false; }

      var url = '/api/feed?limit=' + PAGE + '&offset=' + offset;
      if (activeTab === 'nearby' || activeTab === 'following') url += '&tag=';
      dbg('fetch ' + url);

      fetch(url, { credentials: 'include' })
        .then(function (r) {
          dbg('API ' + r.status);
          return r.json();
        })
        .then(function (data) {
          dbg('posts=' + (data.posts || []).length + ' ok=' + data.ok);
          removeSkeleton();

          var posts = data.posts || [];
          if (!posts.length && offset === 0) {
            var empty = document.createElement('div');
            empty.className = 'feed-empty';
            empty.innerHTML = '<div class="icon">🛍️</div><strong>No posts yet</strong><p>Vendors will post after the next market!</p>';
            viewport.insertBefore(empty, loader);
            exhausted = true;
          } else {
            posts.forEach(function (p) {
              var div = document.createElement('div');
              div.innerHTML = buildItem(p);
              var item = div.firstElementChild;
              viewport.insertBefore(item, loader);
              wireItem(item, p);
              observer.observe(item);
            });
            offset += posts.length;
            if (posts.length < PAGE) exhausted = true;
          }
          loader.style.display = exhausted ? 'none' : '';
        })
        .catch(function (err) {
          dbg('ERROR: ' + (err && err.message ? err.message : 'fetch failed'));
          removeSkeleton();
          if (offset === 0) {
            var empty = document.createElement('div');
            empty.className = 'feed-empty';
            empty.innerHTML = '<div class="icon">⚠️</div><strong>Couldn\'t load feed</strong><p>Check connection and refresh.</p>';
            viewport.insertBefore(empty, loader);
          }
        })
        .finally(function () { busy = false; });
    }

    /* ── TABS ──────────────────────────────────────── */
    if (tabsEl) {
      tabsEl.addEventListener('click', function (e) {
        var tab = e.target.closest('[data-feed]');
        if (!tab) return;
        tabsEl.querySelectorAll('.feed-tab').forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        activeTab = tab.dataset.feed;

        /* clear feed */
        viewport.querySelectorAll('.feed-item, .feed-empty').forEach(function (el) {
          observer.unobserve(el);
          el.remove();
        });
        /* re-add skeletons */
        var sk = document.createElement('div');
        sk.className = 'feed-skeleton'; sk.id = 'sk0';
        sk.innerHTML = '<div class="skel-bg"></div>';
        viewport.insertBefore(sk, loader);
        loadPosts(true);
      });
    }

    /* ── COMMENT DRAWER ────────────────────────────── */
    document.getElementById('commentClose').addEventListener('click', function () {
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
    });
    backdrop.addEventListener('click', function () {
      drawer.classList.remove('open');
      backdrop.classList.remove('open');
    });

    /* ── AUTH ──────────────────────────────────────── */
    fetch('/api/auth/me', { credentials: 'include' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.user) {
          if (authEl) authEl.innerHTML =
            '<a href="/dashboard" style="font-size:.75rem;font-weight:700;color:rgba(255,255,255,.7);padding:5px 0;">@' + esc(d.user.username || d.user.email || 'me') + '</a>';
          /* load liked/saved */
          Promise.all([
            fetch('/api/feed/my-likes', { credentials:'include' }).then(function(r){ return r.json(); }).catch(function(){ return {}; }),
            fetch('/api/feed/my-saves', { credentials:'include' }).then(function(r){ return r.json(); }).catch(function(){ return {}; }),
          ]).then(function (res) {
            (res[0].post_ids || []).forEach(function (id) { likedSet.add(id); });
            (res[1].post_ids || []).forEach(function (id) { savedSet.add(id); });
          });
        }
      }).catch(function(){});

    /* ── INIT ──────────────────────────────────────── */
    loadPosts(true);
  })();
  </script>
</body>
</html>
