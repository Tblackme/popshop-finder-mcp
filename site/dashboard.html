<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard | Vendor Atlas</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav nav-journey">
      <a class="brand" href="/"><span class="brand-mark">VA</span><span>Vendor Atlas</span></a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a class="active" href="/dashboard">Plan</a>
        <a href="/discover">Discover</a>
        <a href="/final-plan">Profit</a>
      </nav>
      <div class="nav-actions" data-auth-nav></div>
      <button class="hamburger" type="button" data-mobile-toggle aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
    <div class="container mobile-drawer" data-mobile-drawer><a href="/">Home</a><a href="/dashboard">Plan</a><a href="/discover">Discover</a><a href="/final-plan">Profit</a><div data-mobile-auth-nav></div></div>
  </header>
  <main data-dashboard-root>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Your market assistant</span>
        <h1 data-dashboard-welcome>Welcome back.</h1>
        <p>Pick one thing to do. We will guide you step by step.</p>
      </div>
    </section>
    <section>
      <div class="container">
        <div class="dashboard-card">
          <span class="eyebrow">Saved markets</span>
          <p class="muted">Your saved markets, recommendations, and next steps will load here.</p>
        </div>
        <div data-guided-dashboard>
          <div class="empty-state"><strong>Loading your assistant...</strong></div>
        </div>
      </div>
    </section>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
