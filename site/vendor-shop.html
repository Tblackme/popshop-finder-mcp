<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vendor Shop | Vendor Atlas</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    /* ── SHOP BANNER ── */
    .shop-banner {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #0f766e 0%, #0b5b55 60%, #134e4a 100%);
      position: relative;
      overflow: hidden;
    }
    .shop-banner-inner {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem; opacity: .12; letter-spacing: .15em;
      font-weight: 900; color: #fff; user-select: none;
    }
    @media (max-width: 600px) { .shop-banner { height: 140px; } }

    /* ── PROFILE HEADER ── */
    .shop-profile-wrap {
      border-bottom: 1px solid var(--line);
      padding-bottom: 1.25rem;
    }
    .shop-profile {
      display: flex;
      align-items: flex-end;
      gap: 1.25rem;
      padding: 0 0 0;
      position: relative;
      margin-top: -44px; /* overlap the banner */
      flex-wrap: wrap;
    }
    .shop-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 4px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: 800; color: #fff;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(12,31,29,.18);
    }
    .shop-profile-info {
      flex: 1; min-width: 0;
      padding-top: 48px; /* push below banner overlap */
    }
    .shop-profile-info h1 { margin: 0 0 .15rem; font-size: 1.6rem; line-height: 1.2; }
    .shop-handle { color: var(--muted); font-size: .88rem; margin: 0 0 .5rem; }
    .shop-stats {
      display: flex; gap: 1.25rem; flex-wrap: wrap; margin: .5rem 0;
    }
    .shop-stat { font-size: .82rem; color: var(--muted); }
    .shop-stat strong { color: var(--text); font-weight: 700; margin-right: .25rem; }
    .shop-bio { font-size: .9rem; color: var(--text); margin: .5rem 0 0; max-width: 560px; line-height: 1.5; }
    .shop-tags { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .55rem; }
    .shop-tag {
      font-size: .75rem; background: rgba(15,118,110,.09);
      color: var(--brand); padding: .18rem .6rem;
      border-radius: 99px; font-weight: 600;
    }
    .shop-social { display: flex; gap: .75rem; margin-top: .55rem; flex-wrap: wrap; }
    .shop-social a {
      font-size: .8rem; color: var(--muted); text-decoration: none;
      display: inline-flex; align-items: center; gap: .25rem;
      transition: color .15s;
    }
    .shop-social a:hover { color: var(--brand); }

    .shop-profile-actions {
      display: flex; gap: .65rem; align-items: flex-start;
      padding-top: 52px; flex-shrink: 0;
    }
    @media (max-width: 680px) {
      .shop-profile { flex-direction: column; align-items: flex-start; margin-top: -36px; }
      .shop-profile-info { padding-top: 0; }
      .shop-profile-actions { padding-top: 0; }
    }

    /* ── SHOP SECTION TABS / FILTERS ── */
    .shop-nav {
      display: flex; gap: .25rem; padding: 1rem 0 0;
      border-bottom: 2px solid var(--line); margin-bottom: 2rem;
    }
    .shop-nav-tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      padding: .6rem 1rem; font-size: .9rem; font-weight: 600;
      color: var(--muted); cursor: pointer; margin-bottom: -2px;
      border-radius: 4px 4px 0 0;
    }
    .shop-nav-tab.active { color: var(--brand); border-bottom-color: var(--brand); }

    /* ── PRODUCTS GRID ── */
    .products-section { padding-bottom: 4rem; }
    .products-filter-bar {
      display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem; flex-wrap: wrap;
    }
    .filter-label { font-size: .8rem; color: var(--muted); font-weight: 600; }
    .filter-pills { display: flex; gap: .35rem; flex-wrap: wrap; }
    .filter-pill {
      padding: .3rem .75rem; border-radius: 99px;
      border: 1.5px solid var(--line); background: var(--bg);
      font-size: .78rem; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .filter-pill:hover, .filter-pill.active {
      border-color: var(--brand); background: rgba(15,118,110,.08); color: var(--brand);
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1.25rem;
    }
    .product-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(12,31,29,.07);
      display: flex; flex-direction: column;
      transition: box-shadow .2s, transform .2s;
      cursor: default;
    }
    .product-card:hover { box-shadow: 0 6px 24px rgba(12,31,29,.12); transform: translateY(-2px); }
    .product-img {
      width: 100%; aspect-ratio: 1;
      object-fit: cover; background: #e8e2d8;
      display: block;
    }
    .product-img-placeholder {
      width: 100%; aspect-ratio: 1;
      background: linear-gradient(135deg, #e8e2d8, #d6cfc4);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }
    .product-body {
      padding: .85rem 1rem 1rem;
      flex: 1; display: flex; flex-direction: column; gap: .3rem;
    }
    .product-name {
      font-weight: 600; font-size: .93rem;
      line-height: 1.35; color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-category { font-size: .75rem; color: var(--muted); }
    .product-price { font-weight: 800; font-size: 1.05rem; color: var(--brand); margin-top: .1rem; }
    .product-stock {
      font-size: .72rem; color: var(--muted);
    }
    .product-stock.out { color: var(--danger, #dc2626); }
    .product-buy { margin-top: auto; padding-top: .6rem; }
    .product-buy a {
      display: block; text-align: center;
      background: var(--brand); color: #fff;
      padding: .45rem .75rem; border-radius: var(--radius-sm);
      font-size: .85rem; font-weight: 600; text-decoration: none;
      transition: opacity .15s;
    }
    .product-buy a:hover { opacity: .88; }

    /* ── ABOUT TAB ── */
    .about-section { max-width: 640px; }
    .about-section h3 { font-size: 1rem; margin: 0 0 .75rem; }
    .about-section p { font-size: .92rem; line-height: 1.65; color: var(--text); margin: 0 0 1rem; }
    .about-detail { display: flex; gap: .75rem; align-items: flex-start; margin-bottom: .6rem; }
    .about-detail .icon { font-size: 1.1rem; flex-shrink: 0; margin-top: .05rem; }
    .about-detail .detail-text { font-size: .88rem; color: var(--text); }
    .about-detail .detail-text span { color: var(--muted); font-size: .8rem; display: block; }

    /* ── UPCOMING EVENTS TAB ── */
    .events-list { max-width: 640px; }
    .event-item {
      background: var(--surface); border-radius: var(--radius-md);
      padding: 1rem 1.25rem; margin-bottom: .75rem;
      display: flex; align-items: center; gap: 1rem;
      box-shadow: 0 1px 6px rgba(12,31,29,.06);
    }
    .event-date-block { text-align: center; flex-shrink: 0; width: 48px; }
    .event-date-block .month { font-size: .65rem; font-weight: 700; text-transform: uppercase; color: var(--brand); letter-spacing: .05em; }
    .event-date-block .day { font-size: 1.4rem; font-weight: 800; line-height: 1; color: var(--text); }
    .event-info { flex: 1; min-width: 0; }
    .event-info strong { display: block; font-size: .93rem; }
    .event-info .event-meta { font-size: .78rem; color: var(--muted); margin-top: .1rem; }

    /* ── EMPTY / LOADING ── */
    .shop-loading { text-align: center; padding: 5rem 1rem; color: var(--muted); }
    .no-products { text-align: center; padding: 3.5rem 1rem; color: var(--muted); grid-column: 1 / -1; }
    .no-products .icon { font-size: 2.5rem; margin-bottom: .5rem; }

    /* ── BADGE ── */
    .badge-verified {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .72rem; font-weight: 700; color: var(--success, #15803d);
      background: rgba(2,122,72,.09); padding: .15rem .6rem; border-radius: 99px;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container nav nav-journey">
      <a class="brand" href="/"><span class="brand-mark">VA</span><span>Vendor Atlas</span></a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard">Plan</a>
        <a href="/discover">Discover</a>
        <a href="/final-plan">Profit</a>
      </nav>
      <div class="nav-actions" data-auth-nav></div>
      <button class="hamburger" type="button" data-mobile-toggle aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
    <div class="container mobile-drawer" data-mobile-drawer>
      <a href="/">Home</a>
      <a href="/dashboard">Plan</a>
      <a href="/discover">Discover</a>
      <a href="/final-plan">Profit</a>
      <div data-mobile-auth-nav></div>
    </div>
  </header>

  <main id="shop-main">
    <div class="shop-loading">Loading vendor…</div>
  </main>

  <script src="/assets/app.js"></script>
  <script>
  (async function () {
    const params = new URLSearchParams(location.search);
    const username = params.get("u") || location.pathname.split("/").filter(Boolean).pop();
    const main = document.getElementById("shop-main");

    if (!username || username === "vendor-shop") {
      main.innerHTML = '<div class="container" style="padding:4rem 0;text-align:center;color:var(--muted)"><strong>No vendor specified.</strong></div>';
      return;
    }

    // Load vendor + products in parallel
    const [vendorRes, productsRes] = await Promise.all([
      fetch(`/api/vendors/${encodeURIComponent(username)}`, { credentials: "include" })
        .then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`/api/vendors/${encodeURIComponent(username)}/products`, { credentials: "include" })
        .then(r => r.ok ? r.json() : null).catch(() => null),
    ]);

    const vendor = vendorRes?.vendor;
    if (!vendor) {
      main.innerHTML = '<div class="container" style="padding:4rem 0;text-align:center;color:var(--muted)"><strong>Vendor not found.</strong></div>';
      return;
    }

    const profile = vendor.profile || {};
    const products = productsRes?.products || [];
    const events = vendor.upcoming_events || [];
    const displayName = vendor.name || ("@" + vendor.username);
    const initial = (vendor.name || vendor.username || "V")[0].toUpperCase();
    const bannerColor = profile.banner_color || "#0f766e";
    const bannerDark = shadeColor(bannerColor, -20);

    // Build social links
    const socials = [
      { url: profile.instagram_url, label: "Instagram", icon: "📸" },
      { url: profile.tiktok_url, label: "TikTok", icon: "🎵" },
      { url: profile.website_url, label: "Website", icon: "🌐" },
    ].filter(s => s.url);

    // Tags
    const tags = [
      profile.category,
      profile.subcategory,
      profile.location,
      profile.price_range ? _priceLabel(profile.price_range) : "",
      profile.preferred_env === "indoor" ? "Indoor" : profile.preferred_env === "outdoor" ? "Outdoor" : "",
    ].filter(Boolean);

    // Render page
    main.innerHTML = `
      <!-- BANNER -->
      <div class="shop-banner" style="background: linear-gradient(135deg, ${escapeHtml(bannerColor)} 0%, ${escapeHtml(bannerDark)} 100%);">
        <div class="shop-banner-inner">${escapeHtml(initial)}${escapeHtml(initial)}</div>
      </div>

      <!-- PROFILE HEADER -->
      <div class="container">
        <div class="shop-profile-wrap">
          <div class="shop-profile">
            <div class="shop-avatar" style="background: linear-gradient(135deg, ${escapeHtml(bannerColor)}, ${escapeHtml(bannerDark)})">
              ${escapeHtml(initial)}
            </div>
            <div class="shop-profile-info">
              <h1>${escapeHtml(displayName)}</h1>
              <p class="shop-handle">@${escapeHtml(vendor.username)}${profile.location ? " · " + escapeHtml(profile.location) : ""}</p>
              <div class="shop-stats">
                ${products.length ? `<div class="shop-stat"><strong>${products.length}</strong> product${products.length === 1 ? "" : "s"}</div>` : ""}
                ${events.length ? `<div class="shop-stat"><strong>${events.length}</strong> upcoming event${events.length === 1 ? "" : "s"}</div>` : ""}
                ${productsRes?.source === "shopify" ? `<div class="shop-stat"><span class="badge-verified">✓ Shopify</span></div>` : ""}
              </div>
              ${vendor.bio ? `<div class="shop-bio">${escapeHtml(vendor.bio)}</div>` : ""}
              ${tags.length ? `<div class="shop-tags">${tags.map(t => `<span class="shop-tag">${escapeHtml(t)}</span>`).join("")}</div>` : ""}
              ${socials.length ? `
                <div class="shop-social">
                  ${socials.map(s => `<a href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${s.icon} ${escapeHtml(s.label)}</a>`).join("")}
                </div>
              ` : ""}
            </div>
            <div class="shop-profile-actions" id="follow-area"></div>
          </div>

          <!-- SHOP NAV -->
          <div class="shop-nav">
            <button class="shop-nav-tab active" data-panel="products">Products${products.length ? ` (${products.length})` : ""}</button>
            ${events.length ? `<button class="shop-nav-tab" data-panel="events">Upcoming (${events.length})</button>` : ""}
            <button class="shop-nav-tab" data-panel="about">About</button>
          </div>
        </div>

        <!-- PRODUCTS PANEL -->
        <div class="products-section" id="panel-products">
          ${buildProductsPanel(products, tags)}
        </div>

        <!-- EVENTS PANEL -->
        ${events.length ? `
          <div class="events-list" id="panel-events" style="display:none;">
            ${buildEventsPanel(events)}
          </div>
        ` : ""}

        <!-- ABOUT PANEL -->
        <div class="about-section" id="panel-about" style="display:none;">
          ${buildAboutPanel(vendor, profile, socials)}
        </div>
      </div>
    `;

    // Tab switching
    document.querySelectorAll(".shop-nav-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".shop-nav-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        ["products","events","about"].forEach(panel => {
          const el = document.getElementById("panel-" + panel);
          if (el) el.style.display = btn.dataset.panel === panel ? "" : "none";
        });
      });
    });

    // Category filter pills
    document.querySelectorAll(".filter-pill").forEach(pill => {
      pill.addEventListener("click", () => {
        document.querySelectorAll(".filter-pill").forEach(p => p.classList.remove("active"));
        pill.classList.add("active");
        const cat = pill.dataset.cat;
        document.querySelectorAll(".product-card[data-category]").forEach(card => {
          card.style.display = (!cat || cat === "all" || card.dataset.category === cat) ? "" : "none";
        });
      });
    });

    // Follow area
    initFollowArea(vendor.id);

    // ── BUILDERS ──
    function buildProductsPanel(products, tags) {
      const cats = [...new Set(products.map(p => p.category).filter(Boolean))];
      const filterBar = cats.length > 1 ? `
        <div class="products-filter-bar">
          <span class="filter-label">Category</span>
          <div class="filter-pills">
            <button class="filter-pill active" data-cat="all">All</button>
            ${cats.map(c => `<button class="filter-pill" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join("")}
          </div>
        </div>` : "";

      if (!products.length) {
        return `
          ${filterBar}
          <div class="products-grid">
            <div class="no-products">
              <div class="icon">🛍️</div>
              <strong>${escapeHtml(displayName)} hasn't added products yet.</strong>
              <p style="margin:.4rem 0 0;font-size:.88rem;">Check back after their next event!</p>
            </div>
          </div>`;
      }
      return `
        ${filterBar}
        <div class="products-grid">
          ${products.map(p => buildProductCard(p)).join("")}
        </div>`;
    }

    function buildProductCard(p) {
      const imgSrc = p.image || p.image_url || "";
      const price = p.price !== null && p.price !== undefined ? p.price : null;
      const buyUrl = p.product_url || p.url || "";
      const inStock = p.in_stock !== false;
      return `
        <div class="product-card" data-category="${escapeHtml(p.category || "")}">
          ${imgSrc
            ? `<img class="product-img" src="${escapeHtml(imgSrc)}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ""}
          <div class="product-img-placeholder" style="${imgSrc ? "display:none" : ""}">🛍️</div>
          <div class="product-body">
            <div class="product-name">${escapeHtml(p.name)}</div>
            ${p.category ? `<div class="product-category">${escapeHtml(p.category)}</div>` : ""}
            ${price !== null ? `<div class="product-price">$${Number(price).toFixed(2)}</div>` : ""}
            <div class="product-stock ${inStock ? "" : "out"}">${inStock ? "In stock" : "Out of stock"}</div>
            ${p.description ? `<div style="font-size:.78rem;color:var(--muted);line-height:1.4;margin-top:.15rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${escapeHtml(p.description)}</div>` : ""}
            ${buyUrl ? `<div class="product-buy"><a href="${escapeHtml(buyUrl)}" target="_blank" rel="noopener">Buy now</a></div>` : ""}
          </div>
        </div>`;
    }

    function buildEventsPanel(events) {
      return events.map(ev => {
        const date = ev.date || ev.start_date || "";
        let month = "", day = "";
        try {
          const d = new Date(date);
          if (!isNaN(d)) {
            month = d.toLocaleDateString("en-US", { month: "short" }).toUpperCase();
            day = d.getDate();
          }
        } catch (_) {}
        return `
          <div class="event-item">
            ${month ? `<div class="event-date-block"><div class="month">${month}</div><div class="day">${day}</div></div>` : ""}
            <div class="event-info">
              <strong>${escapeHtml(ev.name || ev.title || "Event")}</strong>
              <div class="event-meta">
                ${[ev.city, ev.state].filter(Boolean).join(", ") || ev.location || ""}
                ${ev.application_link ? ` · <a href="${escapeHtml(ev.application_link)}" target="_blank" rel="noopener" style="color:var(--brand)">Apply →</a>` : ""}
              </div>
            </div>
          </div>`;
      }).join("");
    }

    function buildAboutPanel(vendor, profile, socials) {
      const details = [
        profile.location && { icon: "📍", text: profile.location, label: "Location" },
        profile.experience_level && { icon: "🎯", text: profile.experience_level === "experienced" ? "Experienced vendor" : "New vendor", label: "Experience" },
        profile.price_range && { icon: "💰", text: _priceLabel(profile.price_range), label: "Price range" },
        profile.main_goal && { icon: "🌱", text: _goalLabel(profile.main_goal), label: "Main goal" },
      ].filter(Boolean);

      return `
        ${vendor.bio ? `<p>${escapeHtml(vendor.bio)}</p>` : ""}
        ${profile.business_name && profile.business_name !== vendor.name ? `<p><strong>${escapeHtml(profile.business_name)}</strong></p>` : ""}
        ${details.map(d => `
          <div class="about-detail">
            <div class="icon">${d.icon}</div>
            <div class="detail-text">${escapeHtml(d.text)}<span>${escapeHtml(d.label)}</span></div>
          </div>`).join("")}
        ${socials.length ? `
          <div style="margin-top:1.25rem;">
            <h3>Links</h3>
            ${socials.map(s => `<div style="margin-bottom:.5rem;"><a href="${escapeHtml(s.url)}" target="_blank" rel="noopener" style="color:var(--brand);font-size:.9rem;">${s.icon} ${escapeHtml(s.label)} ↗</a></div>`).join("")}
          </div>` : ""}`;
    }

    async function initFollowArea(vendorId) {
      const area = document.getElementById("follow-area");
      if (!area) return;
      try {
        const me = await fetch("/api/auth/me", { credentials: "include" }).then(r => r.ok ? r.json() : null);
        if (!me || me.role !== "shopper") return;

        const followed = await fetch("/api/shopper/following", { credentials: "include" })
          .then(r => r.ok ? r.json() : []);
        const isFollowing = Array.isArray(followed) && followed.some(v => String(v.id) === String(vendorId));

        const btn = document.createElement("button");
        btn.className = "btn " + (isFollowing ? "btn-secondary" : "btn-primary");
        btn.textContent = isFollowing ? "Following ✓" : "Follow vendor";
        btn.style.whiteSpace = "nowrap";
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          try {
            await fetch(`/api/vendors/${vendorId}/follow`, { method: "POST", credentials: "include" });
            btn.textContent = "Following ✓";
            btn.className = "btn btn-secondary";
          } catch (_) {}
          btn.disabled = false;
        });
        area.appendChild(btn);
      } catch (_) {}
    }

    function _priceLabel(r) {
      return r === "low" ? "Under $25" : r === "mid" ? "$25–$100" : r === "high" ? "$100+" : r;
    }
    function _goalLabel(g) {
      const map = { sell_out: "Sell out inventory", grow_audience: "Grow audience", test_ideas: "Test new ideas", community: "Build community" };
      return map[g] || g;
    }
    function shadeColor(hex, pct) {
      try {
        let n = parseInt(hex.replace("#",""), 16);
        const amt = Math.round(2.55 * pct);
        const r = Math.min(255, Math.max(0, (n >> 16) + amt));
        const g = Math.min(255, Math.max(0, (n >> 8 & 0xff) + amt));
        const b = Math.min(255, Math.max(0, (n & 0xff) + amt));
        return "#" + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
      } catch (_) { return hex; }
    }
  })();
  function shadeColor(hex, pct) {
    try {
      let n = parseInt(hex.replace("#",""), 16);
      const amt = Math.round(2.55 * pct);
      const r = Math.min(255, Math.max(0, (n >> 16) + amt));
      const g = Math.min(255, Math.max(0, (n >> 8 & 0xff) + amt));
      const b = Math.min(255, Math.max(0, (n & 0xff) + amt));
      return "#" + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
    } catch (_) { return hex; }
  }
  </script>
</body>
</html>
