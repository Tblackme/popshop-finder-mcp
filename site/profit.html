<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profit | Vendor Atlas</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/dash-layout.css">
  <style>
    /* ── Profit page styles ──────────────────────────────────────────────── */
    .profit-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .profit-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.4rem;
      box-shadow: 0 2px 12px rgba(12,31,29,.06);
    }
    .profit-card .pc-label {
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: .4rem;
    }
    .profit-card .pc-value {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--heading);
      line-height: 1.1;
    }
    .profit-card .pc-value.profit { color: var(--success, #027a48); }
    .profit-card .pc-sub {
      font-size: .78rem;
      color: var(--muted);
      margin-top: .2rem;
    }
    .period-tabs {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .period-tab {
      border: 1.5px solid var(--line);
      background: var(--surface);
      border-radius: 9px;
      padding: .35rem .85rem;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
    }
    .period-tab.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .profit-section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(12,31,29,.06);
      margin-bottom: 1.5rem;
    }
    .profit-section h2 { font-size: 1.05rem; margin: 0 0 1rem; }
    .chart-wrap { width: 100%; overflow-x: auto; }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: .5rem;
      height: 140px;
      padding-bottom: 2rem;
      position: relative;
    }
    .chart-bars::after {
      content: '';
      position: absolute;
      bottom: 2rem;
      left: 0; right: 0;
      height: 1px;
      background: var(--line);
    }
    .chart-bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 40px;
    }
    .chart-bar {
      width: 100%;
      background: var(--brand);
      border-radius: 4px 4px 0 0;
      min-height: 3px;
      opacity: .85;
      transition: opacity .15s;
    }
    .chart-bar:hover { opacity: 1; }
    .chart-bar-label {
      font-size: .66rem;
      color: var(--muted);
      margin-top: .4rem;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70px;
    }
    .chart-empty { color: var(--muted); font-size: .9rem; padding: 1.5rem 0; text-align: center; }
    .profit-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    .profit-table th {
      text-align: left;
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      padding: .55rem .75rem .55rem 0;
      border-bottom: 1.5px solid var(--line);
    }
    .profit-table th.num, .profit-table td.num { text-align: right; }
    .profit-table td {
      padding: .7rem .75rem .7rem 0;
      border-bottom: 1px solid var(--line);
      color: var(--text);
    }
    .profit-table tr:last-child td { border-bottom: none; }
    .profit-table .profit-green { color: var(--success, #027a48); font-weight: 700; }
    .profit-table .profit-red { color: #e11d48; font-weight: 700; }
    .table-sort-bar {
      display: flex;
      gap: .5rem;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }
    .sort-btn {
      border: 1.5px solid var(--line);
      background: transparent;
      border-radius: 8px;
      padding: .25rem .7rem;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
    }
    .sort-btn.active { border-color: var(--brand); color: var(--brand); }
    .insight-list { list-style: none; padding: 0; margin: 0; }
    .insight-list li {
      display: flex;
      gap: .75rem;
      align-items: flex-start;
      padding: .65rem 0;
      border-bottom: 1px solid var(--line);
      font-size: .9rem;
    }
    .insight-list li:last-child { border-bottom: none; }
    .insight-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: .05rem; }
    .insight-text strong { display: block; font-size: .9rem; }
    .insight-text span { color: var(--muted); font-size: .82rem; }
    .cat-pills { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .5rem; }
    .cat-pill {
      background: rgba(15,118,110,.08);
      color: var(--brand);
      border-radius: 99px;
      padding: .2rem .7rem;
      font-size: .78rem;
      font-weight: 600;
    }
    @media (max-width: 600px) {
      .profit-cards { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Mobile overlay + slide drawer ──────────────────────────────────── -->
<div class="mobile-drawer-overlay" id="mobile-drawer-overlay"></div>
<nav class="mobile-slide-drawer" id="mobile-slide-drawer" aria-label="Navigation menu">
  <div class="mobile-drawer-header">
    <a class="mobile-drawer-logo" href="/">
      <span>VA</span><span>Vendor Atlas</span>
    </a>
    <button class="mobile-drawer-close" id="mobile-drawer-close" aria-label="Close menu">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="mobile-drawer-nav dash-nav">
    <!-- Populated by dash-layout.js based on role -->
  </div>
</nav>

<!-- ── Dashboard shell ─────────────────────────────────────────────────── -->
<div class="dash-shell">

  <!-- ── Sidebar (desktop) ─────────────────────────────────────────────── -->
  <aside class="dash-sidebar" id="dash-sidebar" aria-label="Sidebar navigation">
    <div class="dash-sidebar-header">
      <a class="dash-sidebar-logo" href="/">
        <span class="dash-sidebar-mark">VA</span>
        <span class="dash-sidebar-title">Vendor Atlas</span>
      </a>
      <button class="dash-collapse-btn" id="dash-collapse-btn" aria-label="Collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <nav class="dash-nav">
      <!-- Populated by dash-layout.js based on role -->
    </nav>

    <div class="dash-sidebar-footer">
      <div data-auth-nav></div>
    </div>
  </aside>

  <!-- ── Main body ─────────────────────────────────────────────────────── -->
  <div class="dash-body">

    <!-- Top bar -->
    <header class="dash-topbar">
      <button class="dash-mobile-menu-btn" id="dash-mobile-menu-btn" aria-label="Open menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="dash-topbar-title" id="dash-page-title">Profit</span>
      <div class="dash-topbar-actions" data-auth-nav></div>
    </header>

    <!-- Page content -->
    <div class="dash-content">
      <div class="dash-page-hero">
        <span class="eyebrow" id="profit-eyebrow">Analytics</span>
        <h1 id="profit-title">Loading your profit data…</h1>
        <p id="profit-subtitle"></p>
      </div>
      <div id="profit-app" data-profit-app>
        <div class="empty-state"><strong>Loading profit data…</strong></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Mobile bottom nav ───────────────────────────────────────────────── -->
<nav class="bottom-nav" aria-label="Mobile navigation">
  <ul class="bottom-nav-items">
    <!-- Populated by dash-layout.js based on role -->
  </ul>
</nav>

<script src="/assets/app.js"></script>
<script src="/assets/dash-layout.js"></script>
</body>
</html>
