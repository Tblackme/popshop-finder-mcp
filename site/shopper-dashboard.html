<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopper Dashboard | Vendor Atlas</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/dash-layout.css">
</head>
<body>

<!-- ── Mobile overlay + slide drawer ──────────────────────────────────── -->
<div class="mobile-drawer-overlay" id="mobile-drawer-overlay"></div>
<nav class="mobile-slide-drawer" id="mobile-slide-drawer" aria-label="Navigation menu">
  <div class="mobile-drawer-header">
    <a class="mobile-drawer-logo" href="/">
      <span>VA</span><span>Vendor Atlas</span>
    </a>
    <button class="mobile-drawer-close" id="mobile-drawer-close" aria-label="Close menu">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="mobile-drawer-nav dash-nav"></div>
</nav>

<!-- ── Dashboard shell ─────────────────────────────────────────────────── -->
<div class="dash-shell">

  <!-- ── Sidebar (desktop) ─────────────────────────────────────────────── -->
  <aside class="dash-sidebar" id="dash-sidebar" aria-label="Sidebar navigation">
    <div class="dash-sidebar-header">
      <a class="dash-sidebar-logo" href="/">
        <span class="dash-sidebar-mark">VA</span>
        <span class="dash-sidebar-title">Vendor Atlas</span>
      </a>
      <button class="dash-collapse-btn" id="dash-collapse-btn" aria-label="Collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <nav class="dash-nav"></nav>

    <div class="dash-sidebar-footer">
      <div data-auth-nav></div>
    </div>
  </aside>

  <!-- ── Main body ─────────────────────────────────────────────────────── -->
  <div class="dash-body">

    <!-- Top bar -->
    <header class="dash-topbar">
      <button class="dash-mobile-menu-btn" id="dash-mobile-menu-btn" aria-label="Open menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="dash-topbar-title" id="dash-page-title">Shopper</span>
      <div class="dash-topbar-actions" data-auth-nav></div>
    </header>

    <!-- Page content -->
    <div class="dash-content">
      <div class="dash-page-hero">
        <span class="eyebrow">Shopper</span>
        <h1>Find great events and the vendors worth visiting.</h1>
        <p>Keep a personal shortlist of markets, follow favorite makers, and plan your next outing around the events that fit your style.</p>
      </div>
      <div data-shopper-dashboard-app>
        <div class="empty-state"><strong>Loading your shopper dashboard…</strong></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Mobile bottom nav ───────────────────────────────────────────────── -->
<nav class="bottom-nav" aria-label="Mobile navigation">
  <ul class="bottom-nav-items"></ul>
</nav>

<script src="/assets/app.js"></script>
<script src="/assets/dash-layout.js"></script>
</body>
</html>
