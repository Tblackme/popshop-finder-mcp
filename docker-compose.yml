version: "3.8"

services:
  # --------------------------------------------------------------------------
  # MCP Server
  # --------------------------------------------------------------------------
  mcp-server:
    build: .
    container_name: vendor-atlas-mcp
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
    volumes:
      - mcp-data:/data/usage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------------
  # Caddy (reverse proxy + auto-TLS) - enable with: docker compose --profile proxy up
  # --------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: vendor-atlas-mcp-caddy
    restart: unless-stopped
    profiles:
      - proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - mcp-server

volumes:
  mcp-data:
  caddy-data:
  caddy-config:
