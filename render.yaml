services:
  - type: web
    name: vendor-atlas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_BASE_URL
        value: https://popshop-finder-mcp.onrender.com
      - key: SERVER_TRANSPORT
        value: sse
      - key: SHOPIFY_SCOPES
        value: read_products,read_inventory
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BILLING_ENABLED
        value: "false"
      - key: FREE_TIER_CALLS
        value: "100"
      - key: RATE_LIMIT_RPM
        value: "60"
