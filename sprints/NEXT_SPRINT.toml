agent = "general-purpose"
phase = "Phase 2: QA"
status = "completed"
priority = "medium"
estimated_hours = 1.0
prompt = """
DESIGN DECISION: Not every frontend issue will show up in Python tests.
WHY: The product now has multiple modals, overlays, list states, and dashboard actions that benefit from a quick manual checklist.

