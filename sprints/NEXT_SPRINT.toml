DESIGN DECISION: The interface should read as polished product copy, not pasted/generated text with encoding artifacts.
WHY: The repo still contains visible punctuation/encoding artifacts in the frontend copy such as odd apostrophes, dashes, and separator glyphs.

Context (CRITICAL):
- site/index.html includes several user-visible copy strings rendered in cards, messages, and helper text.
