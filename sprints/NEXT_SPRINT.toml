# Vendor Atlas Sprint — Convergence + QA
# Focus: align the frontend with the new FastAPI search surface, clean text/encoding rough edges,
# and broaden confidence with a deeper QA/test pass.

sprint_name = "Vendor Atlas — Convergence + QA"
start_date = "2026-03-16"
end_date = "2026-03-30"

# ---------------------------------------------------------------------------
# PHASE 1: Frontend/backend convergence
# ---------------------------------------------------------------------------

[tasks.CONV-001]
id = "CONV-001"
name = "Switch dashboard search fully to /markets/search"
description = "Move the frontend search flow off the legacy /consumer/run wrapper and onto the direct FastAPI search endpoint."
estimated_time = "1.5 hours"
estimated_lines = 70
agent = "general-purpose"
phase = "Phase 1: Convergence"
status = "completed"
priority = "high"
estimated_hours = 1.5
prompt = """
DESIGN DECISION: The dashboard should use the new FastAPI search endpoint directly.
WHY: The backend now exposes GET /markets/search plus /config.json, but site/index.html still partially relies on the older MCP-style wrapper for market search.

Context (CRITICAL):
- server.py exposes GET /markets/search and GET /config.json.
- site/index.html already has CONFIG.API_BASE_URL and the dashboard search flow.
- /markets/search currently returns both event-native fields and a compatibility markets/result payload.

Steps:
1. Update the dashboard search flow to call GET /markets/search directly.
2. Use /config.json when available for runtime API base/config flags.
3. Keep ranking/compare/profile flows working after the search change.
4. Remove any stale assumptions that market search must go through /consumer/run.

Success criteria:
- Market search uses the direct HTTP endpoint.
- The dashboard still renders cards, ranking, save/apply/details, and errors correctly.
"""
dependencies = []

