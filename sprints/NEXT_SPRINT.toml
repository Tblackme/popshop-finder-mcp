estimated_lines = 90
agent = "general-purpose"
phase = "Phase 2: QA"
status = "completed"
priority = "high"
estimated_hours = 1.5
prompt = """
DESIGN DECISION: The system now spans FastAPI endpoints, MCP tools, and browser-facing flows, so tests should cover the newer surfaces directly.
WHY: Current tests are a good start, but more direct coverage will catch regressions in runtime config, search, scoring, and event storage behavior.

Context (CRITICAL):
- tests/test_consumer_flows.py already covers profile, search, compare, scraper, and some pipeline functions.
- server.py now exposes /config.json and /markets/search.
- storage_events.py and storage_markets.py support env-driven paths.

Steps:
1. Add tests for /config.json and /markets/search response shape.
2. Add at least one storage-path/env-oriented test where practical.
3. Keep tests lightweight and local-only.

Success criteria:
- The newer FastAPI surfaces have direct regression coverage.
"""
dependencies = []

