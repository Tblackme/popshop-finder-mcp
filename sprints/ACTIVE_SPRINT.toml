[tasks.VA-001]
id = "VA-001"
name = "Fix API base URL for browser requests"
description = "Set API_BASE_URL at runtime to same origin so consumer fetch() works when served from the same app."
estimated_time = "30 min"
estimated_lines = 15
agent = "general-purpose"
phase = "Phase 1: API"
status = "completed"
prompt = """
DESIGN DECISION: Resolve API_BASE_URL at runtime so the consumer site works when served from the same origin or static host.
WHY: site/index.html currently uses literal '{{API_BASE_URL}}'; no build step substitutes it, so fetch() fails.

Context (CRITICAL):
- Server serves site/index.html via FileResponse (no template substitution).
- Frontend CONFIG.API_BASE_URL is used for fetch(CONFIG.API_BASE_URL + '/consumer/run', ...).
- When served from same origin (e.g. python server.py → GET /), base URL should be window.location.origin.
- When deployed behind a proxy or static host, may need env or a small /config.json.

Steps:
1. In site/index.html, replace CONFIG.API_BASE_URL: '{{API_BASE_URL}}' with runtime resolution:
   - If served from same app: use window.location.origin (e.g. '' or origin) so paths like /consumer/run work.
   - Option: read from a <script> window.__API_BASE__ set by server, or default to window.location.origin.
2. Ensure CORS and routes in server.py allow browser requests to /consumer/run from the same origin.
3. Test: open / in browser, run "Find Markets" or "Save my profile" and confirm network tab shows requests to same origin and succeed (or graceful error if backend unavailable).

Success criteria:
- No literal '{{API_BASE_URL}}' in delivered HTML; requests go to correct origin or configured base.
- Consumer flows (search, profile save, compare) work when server is running; clear error message if server is down.
"""
dependencies = []

[tasks.API-001]
id = "API-001"
name = "Server + billing: return ok false when tool throws"
description = "Billing middleware returns structured error when handler raises; server returns ok: false + error for consumer."
estimated_time = "30 min"
estimated_lines = 25
agent = "general-purpose"
phase = "Phase 1: API"
status = "completed"
prompt = """
DESIGN DECISION: When a tool handler raises an exception, the consumer API must return ok: false and a clear error message so the frontend can show a friendly message instead of wrong empty state or JSON parse errors.
WHY: Billing middleware currently returns {"content": [{"type": "text", "text": "Error: ..."}]}; server then returns ok: true, result: "Error: ...". Frontend JSON.parse(data.result) fails or shows "No markets found".

Context (CRITICAL):
- server.py handle_consumer_run calls billing_middleware; if result has "error" it returns status 400 with result (billing errors). If handler throws, billing returns content with text "Error: msg" but no "error" key.
- billing.py create_billing_middleware: in the except block it sets result = "Error: {error_msg}" and returns {"content": [{"type": "text", "text": result}]}.

Steps:
1. In billing.py: In the middleware's except block, return the same shape as other billing errors so handle_consumer_run can treat it uniformly. Example: return {"error": error_msg} or {"error": {"message": error_msg}}. Do not return content with text "Error: ..." for the consumer path.
2. In server.py: handle_consumer_run already does "if 'error' in result: return web.json_response(result, status=400)". Ensure the response body includes a key the frontend expects (e.g. error as string or error.message). So when billing returns {"error": "..."}, the client gets {"error": "..."}; optionally also set ok: false in the response for consistency (e.g. return web.json_response({"ok": False, "error": result.get("error") or (result.get("error", {}).get("message") if isinstance(result.get("error"), dict) else "Unknown error")}, status=400)).
3. Ensure frontend (API-002) handles status 400 and data.error.

Success criteria:
- When any tool raises, consumer POST /consumer/run gets HTTP 400 (or 500) with body containing ok: false and error: <message>. No ok: true with result string "Error: ...".
"""
dependencies = []

[tasks.API-002]
id = "API-002"
name = "Frontend: handle API errors and show friendly messages"
description = "Every consumer fetch handles !data.ok and non-JSON result; show friendly, non-technical error message in UI."
estimated_time = "30 min"
estimated_lines = 40
agent = "general-purpose"
phase = "Phase 1: API"
status = "completed"
prompt = """
DESIGN DECISION: Every consumer API call must handle !data.ok and non-JSON result; show a friendly, non-technical message in the UI.
WHY: Prevents "No markets found" when the real issue is a server error, and prevents JSON parse errors or blank screens.

Context (CRITICAL):
- site/index.html: fetch(CONFIG.API_BASE_URL + '/consumer/run', ...) is used for build_vendor_profile, search_markets, rank_markets_for_vendor, compare_markets_for_vendor.
- After res.json(), check data.ok. If false, use data.error (or data.error.message or fallback "Something went wrong") and display it where the user expects feedback: results-summary for search, quiz-error for profile, same or modal for compare. Do not call JSON.parse(data.result) when !data.ok.
- When parsing data.result, keep try/catch; in catch or when the string looks like an error (e.g. starts with "Error:"), treat as error and show a friendly message like "We couldn't load that right now. Please try again." instead of empty state.

Steps:
1. Profile save: if (!data.ok) { errorEl.textContent = data.error || "We couldn't save your profile. Please try again."; errorEl.classList.remove('hidden'); return; }. Do not parse data.result if !data.ok.
2. Search: if (!data.ok) { summary.textContent = data.error || "Search failed. Please try again."; list.innerHTML = ''; return; }. When parsing payload, if JSON.parse throws or result is error string, set summary to friendly message and clear list.
3. Compare (Help me choose): if (!data.ok) show data.error in alert or a small inline message, not raw "Unable to compare markets".
4. Ensure all .catch(err) blocks show user-friendly text (e.g. err.message or "Something went wrong") not technical stack or "Failed to fetch".

Success criteria:
- No technical jargon in error messages. User always sees a clear, actionable message when the API fails or returns an error.
"""
dependencies = ["API-001"]

[tasks.BUG-001]
id = "BUG-001"
name = "Fix config.py duplicate ServerConfig and from_env"
description = "Single ServerConfig class with all from_env fields; remove duplicate class that causes TypeError."
estimated_time = "15 min"
estimated_lines = 35
agent = "general-purpose"
phase = "Phase 1: API"
status = "completed"
prompt = """
DESIGN DECISION: config.py defines ServerConfig twice; the second class overwrites the first and its from_env() passes kwargs the second class does not accept, risking TypeError at runtime.
WHY: Ensures server and any code using get_config() start correctly in all environments.

Context (CRITICAL):
- config.py: First block is @dataclass ServerConfig with port, host, auth_token, transport, signal_capture_enabled, signal_log_path, serper_api_key, serper_tools, sync_endpoint, session_tracking_enabled. Second block is plain class ServerConfig with only port, host, auth_token, transport and a from_env() that passes the extra fields — so the second class does not accept them.
- Keep a single ServerConfig with all fields used by from_env (port, host, auth_token, transport, signal_capture_enabled, signal_log_path, serper_api_key, serper_tools, sync_endpoint, session_tracking_enabled). Use @dataclass and one from_env() that returns cls(...) with every field set from os.environ with sensible defaults.

Steps:
1. Remove the duplicate class. Keep one ServerConfig with all fields: port, host, auth_token, transport, signal_capture_enabled, signal_log_path, serper_api_key, serper_tools, sync_endpoint, session_tracking_enabled.
2. Single from_env() that reads env and returns cls(port=..., host=..., ...). Defaults: port 3000, host "0.0.0.0", auth_token "", transport "sse", signal_capture_enabled True, signal_log_path "/data/signals/signals.json", serper_api_key "", serper_tools "all", sync_endpoint "", session_tracking_enabled True.
3. Ensure get_config() and any import of ServerConfig still work.

Success criteria:
- Only one ServerConfig class. from_env() runs without TypeError. get_config() returns a valid config.
"""
dependencies = []

