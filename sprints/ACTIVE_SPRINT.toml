[tasks.DISC-001]
id = "DISC-001"
name = "Wire Brave Search as free Serper replacement"
description = "Add Brave Search API support to _fetch_search_results so discover_events works on the free tier (2k/month, no card)."
estimated_time = "45 min"
estimated_lines = 40
agent = "general-purpose"
phase = "Phase 1: Discovery"
status = "todo"
priority = "critical"
estimated_hours = 0.75
prompt = """
DESIGN DECISION: Use Brave Search API as the primary web search backend for discover_events.
WHY: Serper credits are exhausted. Brave gives 2,000 free queries/month with no credit card and structured JSON results nearly identical to Serper. The Claude web_search path was implemented but requires a paid Anthropic plan.

Context (CRITICAL):
- tools/vendor_atlas_pipeline.py, _fetch_search_results(): currently branches on SERPER_API_KEY then falls back to DuckDuckGo HTML scraping.
- Brave Search API endpoint: https://api.search.brave.com/res/v1/web/search
- Auth header: X-Subscription-Token: <key>
- Response shape: { web: { results: [{ title, url, description }] } }
- New env var: BRAVE_SEARCH_API_KEY (read via os.environ.get)
- Priority order should be: Brave → Serper → DuckDuckGo fallback

Steps:
1. In tools/vendor_atlas_pipeline.py, add BRAVE_SEARCH_API_KEY = os.environ.get("BRAVE_SEARCH_API_KEY", "") near the top.
2. Add _parse_brave_results(data, source, city, state, keywords) mirroring _parse_serper_results but reading data["web"]["results"] with fields title/url/description.
3. In _fetch_search_results, check BRAVE_SEARCH_API_KEY first — POST to Brave endpoint with header X-Subscription-Token and params q=query&count=10. Parse with _parse_brave_results.
4. Keep existing Serper branch as second fallback, DuckDuckGo as third.
5. Add BRAVE_SEARCH_API_KEY= to .env.example with a comment pointing to api.search.brave.com.

Success criteria:
- With BRAVE_SEARCH_API_KEY set, discover_events returns real live results.
- Without it, graceful fallback to Serper then DuckDuckGo.
- No breaking changes to existing tool signatures.
"""
dependencies = []

[tasks.DISC-002]
id = "DISC-002"
name = "Add BRAVE_SEARCH_API_KEY to .env and test live discovery"
description = "Set the Brave key in .env and run a live smoke test confirming discover_events returns results for Kansas City MO."
estimated_time = "15 min"
estimated_lines = 2
agent = "general-purpose"
phase = "Phase 1: Discovery"
status = "todo"
priority = "critical"
estimated_hours = 0.25
prompt = """
DESIGN DECISION: Confirm live discovery works end-to-end with the new Brave key.
WHY: The key needs to be in .env and the full pipeline (search → candidate scoring → page verification) needs a real run to catch any issues.

Steps:
1. Add BRAVE_SEARCH_API_KEY=<user's key> to .env.
2. Run: python scripts/test_discover_events_mcp.py --city "Kansas City" --state MO
3. Confirm at least 3 results are returned.
4. If 0 results: check candidate scoring thresholds in _is_precise_discovery_candidate — Brave snippets may be shorter than Serper snippets, lowering the precision_score.

Success criteria:
- discover_events returns ≥ 3 live events for Kansas City MO.
"""
dependencies = ["DISC-001"]

[tasks.DISC-003]
id = "DISC-003"
name = "Tune candidate precision scoring for Brave Search results"
description = "Brave snippets are shorter than Serper — adjust _is_precise_discovery_candidate threshold or boost snippet scoring so results aren't filtered out."
estimated_time = "30 min"
estimated_lines = 20
agent = "general-purpose"
phase = "Phase 1: Discovery"
status = "todo"
priority = "high"
estimated_hours = 0.5
prompt = """
DESIGN DECISION: Brave Search result snippets tend to be shorter than Serper's, which can push precision_score below the threshold=3 cutoff.
WHY: If score < 3, _is_precise_discovery_candidate returns False and the result is dropped before page verification.

Context (CRITICAL):
- tools/vendor_atlas_pipeline.py: _candidate_precision_score, _is_precise_discovery_candidate
- Current threshold: total_score >= 3 AND title_score > 0
- Brave results have title + url + description (snippet). The snippet is often just 1 sentence.
- Fix options:
  a) Add snippet scoring: score += _event_keyword_score(snippet)
  b) Lower threshold to 2 for Brave source
  c) Both

Steps:
1. In _fetch_search_results Brave branch, pass snippet through to each candidate dict.
2. In _candidate_precision_score, add: if snippet: score += _event_keyword_score(snippet)
3. Optionally lower threshold for brave_search source in _is_precise_discovery_candidate.
4. Re-run live test and confirm results improve.

Success criteria:
- At least 5 candidate events pass the precision filter for a KC MO search.
"""
dependencies = ["DISC-001"]

