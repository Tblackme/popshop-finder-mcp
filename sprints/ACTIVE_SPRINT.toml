[tasks.DB-001]
id = "DB-001"
name = "Supabase/Postgres migration for production data"
description = "Migrate from SQLite to Postgres (Supabase) for events, users, and marketplace tables."
estimated_time = "4 hours"
estimated_lines = 200
agent = "general-purpose"
phase = "Phase 4: Auth + DB"
status = "todo"
priority = "medium"
estimated_hours = 4.0
prompt = """
DESIGN DECISION: Move to Postgres (via Supabase) for production persistence.
WHY: SQLite is fine for dev but cannot scale for multi-user production. DATABASE_URL and SUPABASE_* keys are already in .env.example.

Context (CRITICAL):
- All storage modules (storage_events, storage_users, storage_marketplace, etc.) use sqlite3 directly.
- db_runtime.py has backend_summary() that checks which backend is active.
- Target: read DATABASE_URL from env; if set use psycopg3 (psycopg already in requirements.txt), else SQLite.
- Schema should be identical — only the connection and placeholder syntax changes (? → %s).

Steps:
1. Add a db.py connection factory: returns sqlite3 conn if no DATABASE_URL, psycopg3 conn if set.
2. Update each storage module to use the factory and swap ? placeholders for %s when on Postgres.
3. Add a migration script (scripts/migrate_to_postgres.py) that reads existing SQLite and bulk-inserts to Postgres.
4. Test: set DATABASE_URL to a Supabase connection string, run migrations, confirm all storage tests pass.

Success criteria:
- App runs on both SQLite (dev) and Postgres (prod) with same code.
- No data loss during migration.
- All 16 MCP tools pass smoke test on Postgres backend.
"""
