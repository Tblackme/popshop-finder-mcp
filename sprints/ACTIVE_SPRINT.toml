sprint_name = "Vendor Atlas — MVP (API + UX + Bug Fixes)"
start_date = "2026-03-16"
end_date = "2026-03-30"

# ---------------------------------------------------------------------------
# PHASE 1: API fixes (easiest first — unblock consumer flows)
